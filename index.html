</style>

{"de":"Mitunter schlägt die Stimmung um, wenn man einer rätselhaften Vorliebe ausgesetzt wird, die gerade angesagt ist.","ua":"Інколи настрій різко змінюється, коли піддаєшся загадковому уподобанню, яке зараз у тренді.","ru":"Порой настроение резко меняется, когда подвергаешься загадочному пристрастию, которое сейчас в тренде.","en":"Sometimes the mood changes abruptly when you are exposed to a mysterious preference that is currently trendy."},
{"de":"Das angesagte Café war rätselhaft leer, und mitunter fragte man sich, welcher Vorliebe man dort ausgesetzt war, bevor alles umschlug.","ua":"Модне кафе було загадково порожнє, і інколи думав, якому уподобанню там піддавався, перш ніж усе різко змінилося.","ru":"Модное кафе было загадочно пусто, и порой думал, какому пристрастию там подвергался, прежде чем всё резко изменилось.","en":"The trendy café was mysteriously empty, and sometimes one wondered what preference one was exposed to there before everything changed abruptly."},
{"de":"Wer einer rätselhaften Vorliebe mitunter ausgesetzt ist, merkt schnell, wie angesagt es sein kann, wenn die Lage umschlägt.","ua":"Той, хто інколи підданий загадковому уподобанню, швидко помічає, наскільки це може бути трендово, коли ситуація різко змінюється.","ru":"Тот, кто порой подвержен загадочному пристрастию, быстро замечает, насколько это может быть модно, когда ситуация резко меняется.","en":"Whoever is sometimes exposed to a mysterious preference quickly notices how trendy it can be when the situation changes abruptly."}
]},

{"de":"Der Wirt wirkte befangen, als der herablassende Gast jählings mitnichten zufrieden war.","ua":"Господар виглядав збентеженим, коли зверхній гість раптово виявився аж ніяк не задоволеним.","ru":"Хозяин выглядел смущённым, когда высокомерный гость внезапно оказался отнюдь не доволен.","en":"The host seemed self-conscious when the condescending guest was suddenly by no means satisfied."},

{"de":"Träge saß er da, umgeben von allerlei niedlichen Dingen, und konnte niemandem etwas vorwerfen, was er selbst verabscheute.","ua":"Млявий, він сидів, оточений всілякими милими речами, і не міг нікому докоряти за те, що сам ненавидів.","ru":"Вялый, он сидел, окружённый всякими милыми вещами, и не мог никому ставить в упрёк то, что сам ненавидел.","en":"Sluggishly he sat there, surrounded by all sorts of cute things, and could not blame anyone for what he himself loathed."},

function getTrans(w){return _lang==="ru"?w.ru:(_lang==="en"?w.en:w.ua);}
function getEx(w){return _lang==="ru"?w.exRu:(_lang==="en"?w.exEn:w.exUa);}
function getExLabel(){return _lang==="ru"?"Пример:":(_lang==="en"?"Example:":"Приклад:");}
function getSentTrans(s){return _lang==="ru"?s.ru:(_lang==="en"?s.en:s.ua);}
function showToast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2200);}
function confetti(){var c=["#6c63ff","#ff6584","#ffbe0b","#4caf50","#00bcd4"];for(var i=0;i<28;i++){var el=document.createElement("div");el.className="confetti-piece";el.style.cssText="left:"+(Math.random()*100)+"vw;top:-10px;background:"+c[Math.floor(Math.random()*5)]+";animation-delay:"+(Math.random()*0.6)+"s;width:"+(6+Math.random()*8)+"px;height:"+(6+Math.random()*8)+"px;";document.body.appendChild(el);setTimeout(function(){el.remove();},2000);}}
function updateStats(){
  var total=0;_groups.forEach(function(g){total+=g.sentences.length;});
  var repCount=_words.filter(function(w){return w.repeat;}).length;
  document.getElementById("stat-total").textContent=_words.length;
  document.getElementById("stat-learned").textContent=_words.filter(function(w){return w.learned;}).length;
  document.getElementById("stat-repeat").textContent=repCount;
  document.getElementById("stat-sentences").textContent=total;
  document.getElementById("stat-streak").textContent=_quizStreak+"🔥";
  document.getElementById("repeat-count").textContent=repCount;
}
function setLang(l){_lang=l;document.getElementById("lang-ua").classList.toggle("active",l==="ua");document.getElementById("lang-ru").classList.toggle("active",l==="ru");document.getElementById("lang-en").classList.toggle("active",l==="en");renderWords();renderRepeat();renderSentences();var qs=document.getElementById("quiz-section");if(qs&&qs.classList.contains("active"))startQuiz();}
function switchTab(tab){["words","repeat","sentences","quiz"].forEach(function(t){document.getElementById("tab-"+t).classList.toggle("active",t===tab);document.getElementById(t+"-section").classList.toggle("active",t===tab);});if(tab==="quiz")startQuiz();if(tab==="repeat")renderRepeat();}

function buildCard(item, i, inRepeatSection){
  var card=document.createElement("div");
  var cls="card";
  if(item.learned) cls+=" learned";
  if(item.repeat) cls+=" repeat";
  card.className=cls;

  var delBtn=document.createElement("button");
  delBtn.className="delete-btn";
  delBtn.textContent="✕";
  delBtn.addEventListener("click",function(e){e.stopPropagation();_words.splice(i,1);renderWords();renderRepeat();});

  var wordDiv=document.createElement("div");
  wordDiv.className="word";
  wordDiv.textContent=item.word;

  var transDiv=document.createElement("div");
  transDiv.className="translation";
  transDiv.textContent=getTrans(item);

  var exDiv=document.createElement("div");
  exDiv.className="example";

  // German sentence label + text
  var exDeSpan=document.createElement("span");
  exDeSpan.className="ex-de";
  exDeSpan.textContent=item.exDe||"";

  var exLabel=document.createElement("span");
  exLabel.className="ex-label";
  exLabel.textContent=getExLabel();

  var exTransSpan=document.createElement("span");
  exTransSpan.className="ex-trans";
  exTransSpan.textContent=getEx(item)||"";

  if(item.exDe) exDiv.appendChild(exDeSpan);
  exDiv.appendChild(exLabel);
  exDiv.appendChild(exTransSpan);

  var actDiv=document.createElement("div");
  actDiv.className="card-actions";

  var learnBtn=document.createElement("button");
  learnBtn.className="btn-learn"+(item.learned?" done":"");
  learnBtn.textContent=item.learned?"✅ Вивчено":"📌 Вивчив";
  learnBtn.addEventListener("click",function(e){
    e.stopPropagation();
    _words[i].learned=!_words[i].learned;
    if(_words[i].learned){confetti();showToast("🎉 Відмічено як вивчене!");}
    renderWords();renderRepeat();
  });

  var repeatBtn=document.createElement("button");
  repeatBtn.className="btn-repeat"+(item.repeat?" on":"");
  repeatBtn.textContent=item.repeat?"🔁 В списку":"🔁 Повторити";
  repeatBtn.addEventListener("click",function(e){
    e.stopPropagation();
    _words[i].repeat=!_words[i].repeat;
    if(_words[i].repeat){showToast("🔁 Додано до повторення!");}else{showToast("Прибрано з повторення");}
    renderWords();renderRepeat();
  });

  actDiv.appendChild(learnBtn);
  actDiv.appendChild(repeatBtn);

  card.appendChild(delBtn);
  card.appendChild(wordDiv);
  card.appendChild(transDiv);
  card.appendChild(exDiv);

  if(item.repeat&&!item.learned){var rb=document.createElement("div");rb.className="repeat-badge";rb.textContent="🔁 До повторення";card.appendChild(rb);}
  else if(item.learned){var badge=document.createElement("div");badge.className="learned-badge";badge.textContent="✅ Вивчено";card.appendChild(badge);}
  else{var hint=document.createElement("div");hint.className="hint";hint.textContent="👆 натисни";card.appendChild(hint);}

  card.appendChild(actDiv);
  card.addEventListener("click",function(){
    this.classList.toggle("flipped");
    var h=this.querySelector(".hint");
    if(h)h.style.display=this.classList.contains("flipped")?"none":"block";
  });
  return card;
}

function renderWords(){
  var q=(document.getElementById("searchInput").value||"").toLowerCase();
  var c=document.getElementById("cards");
  c.innerHTML="";
  var f=_words.filter(function(w){return !q||w.word.toLowerCase().includes(q)||getTrans(w).toLowerCase().includes(q);});
  if(!f.length){c.innerHTML='<div class="empty">Нічого не знайдено 🤷</div>';return;}
  f.forEach(function(item){
    var i=_words.indexOf(item);
    c.appendChild(buildCard(item,i,false));
  });
  updateStats();
}

function renderRepeat(){
  var c=document.getElementById("repeat-cards");
  c.innerHTML="";
  var rep=_words.filter(function(w){return w.repeat;});
  if(!rep.length){
    c.innerHTML='<div class="empty">Тут будуть слова для повторення.<br>Натисни 🔁 на будь-якій карточці, щоб додати.</div>';
    updateStats();return;
  }
  // Header
  var hdr=document.createElement("div");
  hdr.className="repeat-section-header";
  hdr.innerHTML='🔁 Слова для повторення: <strong>'+rep.length+'</strong>';
  c.appendChild(hdr);
  var grid=document.createElement("div");
  grid.className="cards";
  rep.forEach(function(item){
    var i=_words.indexOf(item);
    grid.appendChild(buildCard(item,i,true));
  });
  c.appendChild(grid);
  updateStats();
}

function addWord(){
  var w=document.getElementById("wordInput").value.trim(),
      ua=document.getElementById("transUaInput").value.trim(),
      ru=document.getElementById("transRuInput").value.trim(),
      en=document.getElementById("transEnInput").value.trim();
  if(!w)return;
  _words.push({word:w,ua:ua||"—",ru:ru||"—",en:en||"—",learned:false,repeat:false,exDe:"",exUa:"",exRu:"",exEn:""});
  document.getElementById("wordInput").value="";
  document.getElementById("transUaInput").value="";
  document.getElementById("transRuInput").value="";
  document.getElementById("transEnInput").value="";
  showToast("✅ Слово додано!");renderWords();
}

function renderSentences(){
  var wrap=document.getElementById("sentences-wrap");
  wrap.innerHTML="";
  _groups.forEach(function(group){
    var sec=document.createElement("div");
    sec.style.marginBottom="28px";
    var title=document.createElement("div");
    title.className="group-title";
    title.textContent=group.title;
    sec.appendChild(title);
    var nav=document.createElement("div");nav.className="sent-nav";
    var btnPrev=document.createElement("button");btnPrev.textContent="←";
    var counter=document.createElement("span");counter.className="sent-counter";
    var btnNext=document.createElement("button");btnNext.textContent="→";
    nav.appendChild(btnPrev);nav.appendChild(counter);nav.appendChild(btnNext);
    sec.appendChild(nav);
    var cardArea=document.createElement("div");
    sec.appendChild(cardArea);
    wrap.appendChild(sec);
    var idx=0;
    function showCard(){
      var s=group.sentences[idx];
      counter.textContent=(idx+1)+" / "+group.sentences.length;
      btnPrev.disabled=(idx===0);btnNext.disabled=(idx===group.sentences.length-1);
      cardArea.innerHTML="";
      var card=document.createElement("div");card.className="sentence-card";
      var numDiv=document.createElement("div");numDiv.className="num";numDiv.textContent="№ "+(idx+1);
      var deDiv=document.createElement("div");deDiv.className="de";deDiv.textContent=s.de;
      var transDiv=document.createElement("div");transDiv.className="trans";transDiv.textContent=getSentTrans(s);
      var hintDiv=document.createElement("div");hintDiv.className="s-hint";hintDiv.textContent="👆 натисни, щоб побачити переклад";
      card.appendChild(numDiv);card.appendChild(deDiv);card.appendChild(transDiv);card.appendChild(hintDiv);
      card.addEventListener("click",function(){this.classList.toggle("flipped");});
      cardArea.appendChild(card);
    }
    btnPrev.addEventListener("click",function(){if(idx>0){idx--;showCard();}});
    btnNext.addEventListener("click",function(){if(idx<group.sentences.length-1){idx++;showCard();}});
    showCard();
  });
  updateStats();
}

function startQuiz(){
  var u=_words.filter(function(w){return !w.learned;});
  if(u.length<2){
    var area=document.getElementById("quiz-area");area.innerHTML="";
    var qcard=document.createElement("div");qcard.className="quiz-card";
    var qq=document.createElement("div");qq.className="quiz-question";qq.textContent="🎉 Всі слова вивчені!";qcard.appendChild(qq);
    area.appendChild(qcard);
    var btns=document.createElement("div");btns.className="quiz-btns";
    var b=document.createElement("button");b.className="btn-show";b.textContent="← До слів";b.addEventListener("click",function(){switchTab("words");});btns.appendChild(b);
    area.appendChild(btns);return;
  }
  _quizOrder=u.map(function(w){return _words.indexOf(w);}).sort(function(){return Math.random()-0.5;});
  _quizIndex=0;_quizScore=0;showQuizCard();
}

function showQuizCard(){
  var area=document.getElementById("quiz-area");area.innerHTML="";
  if(_quizIndex>=_quizOrder.length){
    var pct=Math.round((_quizScore/_quizOrder.length)*100);
    var qcard=document.createElement("div");qcard.className="quiz-card";
    var qq=document.createElement("div");qq.className="quiz-question";qq.textContent=_quizScore+"/"+_quizOrder.length;qcard.appendChild(qq);
    var qs=document.createElement("div");qs.className="quiz-sub";qs.textContent=(pct>=80?"🔥 Відмінно!":pct>=50?"👍 Непогано!":"💪 Продовжуй!")+" "+pct+"%";qcard.appendChild(qs);
    var pb=document.createElement("div");pb.className="progress-bar";var pf=document.createElement("div");pf.className="progress-fill";pf.style.width=pct+"%";pb.appendChild(pf);qcard.appendChild(pb);
    area.appendChild(qcard);
    var btns=document.createElement("div");btns.className="quiz-btns";
    var b1=document.createElement("button");b1.className="btn-show";b1.textContent="🔄 Ще раз";b1.addEventListener("click",startQuiz);btns.appendChild(b1);
    var b2=document.createElement("button");b2.className="btn-correct";b2.textContent="← До слів";b2.addEventListener("click",function(){switchTab("words");});btns.appendChild(b2);
    area.appendChild(btns);
    if(pct>=80)confetti();return;
  }
  var w=_words[_quizOrder[_quizIndex]];
  var pct=Math.round((_quizIndex/_quizOrder.length)*100);
  var prog=document.createElement("div");prog.className="quiz-progress";prog.textContent=(_quizIndex+1)+" / "+_quizOrder.length;area.appendChild(prog);
  var score=document.createElement("div");score.className="quiz-score";score.textContent="✅ "+_quizScore+" вірних | 🔥 "+_quizStreak+" підряд";area.appendChild(score);
  var pb=document.createElement("div");pb.className="progress-bar";var pf=document.createElement("div");pf.className="progress-fill";pf.style.width=pct+"%";pb.appendChild(pf);area.appendChild(pb);
  var qcard=document.createElement("div");qcard.className="quiz-card";
  var qs=document.createElement("div");qs.className="quiz-sub";qs.textContent="Як перекладається?";qcard.appendChild(qs);
  var qq=document.createElement("div");qq.className="quiz-question";qq.textContent=w.word;qcard.appendChild(qq);
  var ans=document.createElement("div");ans.className="quiz-answer";ans.id="quiz-ans";
  ans.textContent=getTrans(w);
  if(w.exDe){var exde=document.createElement("em");exde.style.cssText="font-size:11px;color:#3a3a6e;font-weight:600;font-style:normal;display:block;margin-top:6px";exde.textContent=w.exDe;ans.appendChild(exde);}
  var exem=document.createElement("em");exem.style.cssText="font-size:11px;color:#aaa;display:block;margin-top:3px";exem.textContent=getEx(w);ans.appendChild(exem);
  qcard.appendChild(ans);area.appendChild(qcard);
  var btns=document.createElement("div");btns.className="quiz-btns";
  var bShow=document.createElement("button");bShow.className="btn-show";bShow.textContent="👁 Показати";
  var bOk=document.createElement("button");bOk.className="btn-correct";bOk.textContent="✅ Знав";bOk.style.display="none";
  var bNo=document.createElement("button");bNo.className="btn-wrong";bNo.textContent="❌ Не знав";bNo.style.display="none";
  bShow.addEventListener("click",function(){ans.style.display="block";bShow.style.display="none";bOk.style.display="inline-block";bNo.style.display="inline-block";});
  bOk.addEventListener("click",function(){_quizScore++;_quizStreak++;showToast("🎉 Правильно!");if(_quizStreak%3===0)confetti();updateStats();_quizIndex++;setTimeout(showQuizCard,400);});
  bNo.addEventListener("click",function(){_quizStreak=0;showToast("❌ Наступного разу!");updateStats();_quizIndex++;setTimeout(showQuizCard,400);});
  btns.appendChild(bShow);btns.appendChild(bOk);btns.appendChild(bNo);
  area.appendChild(btns);
}
renderWords();renderSentences();updateStats();
</script>
<script>
(function(){
function _save(){try{localStorage.setItem('jane_words',JSON.stringify(_words));localStorage.setItem('jane_groups',JSON.stringify(_groups));}catch(e){}}
function _load(){
  try{
    var sw=localStorage.getItem('jane_words');
    var sg=localStorage.getItem('jane_groups');
    if(sw){var pw=JSON.parse(sw);var orig=_words.map(function(w){return w.word;});pw.forEach(function(w){var i=orig.indexOf(w.word);if(i===-1){_words.push(w);}else{_words[i].learned=w.learned;_words[i].repeat=w.repeat||false;}});}
    if(sg){var pg=JSON.parse(sg);var origT=_groups.map(function(g){return g.title;});pg.forEach(function(g){if(origT.indexOf(g.title)===-1){_groups.push(g);}});}
  }catch(e){}
}
var _oa=window.addWord;window.addWord=function(){_oa();_save();};
var _or=window.renderWords;window.renderWords=function(){_or();_save();};
_load();renderWords();renderRepeat();renderSentences();updateStats();
})();
</script>
