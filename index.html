body{font-family:'Segoe UI',sans-serif;background:#f0f4ff;min-height:100vh;padding:24px 20px;}

.delete-btn{position:absolute;top:9px;right:11px;background:none;border:none;color:#ddd;font-size:16px;cursor:pointer;transition:color 0.2s;line-height:1;}

.section{display:none;}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);background:#3a3a6e;color:white;padding:11px 22px;border-radius:14px;font-size:14px;font-weight:600;opacity:0;transition:all 0.3s;pointer-events:none;z-index:9999;}

.confetti-piece{position:fixed;width:10px;height:10px;border-radius:2px;animation:fall 1.5s ease-in forwards;pointer-events:none;z-index:9999;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}
</style>

var _groups=[{"title":"📚 Група 1: sichtlich · derart · beinahe · ausrenken · fürchten · geschmeidig · grausam · die Unwissenheit · die Tatsache · hektisch · unmittelbar","sentences":[{"de":"Er war sichtlich erschöpft, als er beinahe ausgerenkt wurde, während er sich derart geschmeidig bewegte, dass niemand die Tatsache bemerkte.","ua":"Він був явно виснажений, коли мало не вивихнув суглоб, рухаючись настільки гнучко, що ніхто не помітив цього факту.","ru":"Он был явно измотан, когда едва не вывихнул сустав, двигаясь настолько гибко, что никто не заметил этого факта."},{"de":"Die Unwissenheit war grausam, denn beinahe jeder fürchtete die hektische Stimmung, die sichtlich unmittelbar nach der Nachricht entstand.","ua":"Незнання було жорстоким, адже майже кожен боявся метушливого настрою, який явно виник одразу після новини.","ru":"Незнание было жестоким, ведь почти каждый боялся суетливого настроения, которое явно возникло сразу после новости."},{"de":"Es war derart hektisch, dass man sich beinahe den Arm ausrenken konnte, und niemand fürchtete die Tatsache, sichtlich überfordert zu wirken.","ua":"Було настільки метушливо, що можна було майже вивихнути руку, і ніхто не боявся явно виглядати перевантаженим.","ru":"Было настолько суетливо, что можно было едва не вывихнуть руку, и никто не боялся явно выглядеть перегруженным."},{"de":"Die Unwissenheit machte alles derart schwer, dass er sich unmittelbar fürchtete und sichtlich hektisch wurde, obwohl er sich grausam beherrschen wollte.","ua":"Незнання зробило все настільки важким, що він одразу злякався і явно занервував, хоча жорстоко намагався стримати себе.","ru":"Незнание сделало всё настолько тяжёлым, что он сразу испугался и явно занервничал, хотя жестоко пытался сдержать себя."},{"de":"Beinahe geschmeidig, aber sichtlich erschöpft, fürchtete er die Tatsache, dass die grausame Unwissenheit ihn unmittelbar in eine hektische Lage gebracht hatte.","ua":"Майже гнучко, але явно виснажено, він боявся факту, що жорстоке незнання безпосередньо кинуло його в метушливу ситуацію.","ru":"Почти гибко, но явно изнурённо, он боялся факта, что жестокое незнание непосредственно ввергло его в суетливую ситуацию."}]},{"title":"🔥 Група 2: kraftvoll · die Gestalt · schlugen · einmal · das Elend","sentences":[{"de":"Einmal stand eine kraftvolle Gestalt am Fenster, während die Wellen schlugen und das Elend der Stadt sichtbar wurde.","ua":"Одного разу потужна постать стояла біля вікна, поки хвилі вдаряли й горе міста ставало помітним.","ru":"Однажды мощная фигура стояла у окна, пока волны ударяли и горе города становилось заметным."},{"de":"Die Gestalt war kraftvoll, aber einmal hatte das Elend sie so hart getroffen, dass die Tränen schlugen wie Regen.","ua":"Постать була потужною, але одного разу горе вдарило її так сильно, що сльози лились, як дощ.","ru":"Фигура была мощной, но однажды горе ударило её так сильно, что слёзы лились, как дождь."},{"de":"Einmal versuchte die kraftvolle Gestalt, das Elend zu überwinden, aber die Wellen schlugen immer wieder gegen ihre Hoffnungen.","ua":"Одного разу потужна постать намагалася подолати горе, але хвилі знову й знову вдаряли по її надіям.","ru":"Однажды мощная фигура пыталась преодолеть горе, но волны снова и снова ударяли по её надеждам."},{"de":"Das Elend der Straße schlugen einmal so tief in die Seele der kraftvollen Gestalt, dass sie nicht mehr sprechen konnte.","ua":"Горе вулиці одного разу так глибоко вдарило в душу потужної постаті, що вона більше не могла говорити.","ru":"Горе улицы однажды так глубоко ударило в душу мощной фигуры, что она больше не могла говорить."},{"de":"Kraftvoll und entschlossen stand die Gestalt einmal mitten im Elend, während ringsum die Herzen schlugen vor Angst.","ua":"Потужно і рішуче постать стояла одного разу посеред горя, поки навколо серця билися від страху.","ru":"Мощно и решительно фигура стояла однажды посреди горя, пока вокруг сердца бились от страха."}]},{"title":"✨ Група 3: künftig · beschleunigen · die Arglosigkeit · gedankenlos · ehe","sentences":[{"de":"Ehe er gedankenlos handelte, wollte er künftig seine Arglosigkeit überwinden und das Leben bewusst beschleunigen.","ua":"Перш ніж діяти необдумано, він хотів у майбутньому подолати свою довірливість і свідомо прискорити своє життя.","ru":"Прежде чем действовать необдуманно, он хотел в будущем преодолеть свою доверчивость и осознанно ускорить свою жизнь."},{"de":"Die Arglosigkeit des Kindes war so groß, dass es gedankenlos handelte, ehe jemand eingreifen konnte, um die Entwicklung zu beschleunigen.","ua":"Довірливість дитини була такою великою, що вона діяла необдумано, перш ніж хтось міг втрутитися та прискорити розвиток подій.","ru":"Доверчивость ребёнка была настолько велика, что он действовал необдуманно, прежде чем кто-то мог вмешаться и ускорить ход событий."},{"de":"Künftig wollte er nicht mehr gedankenlos sein, ehe er wichtige Entscheidungen traf, denn seine Arglosigkeit hatte alles beschleunigt.","ua":"У майбутньому він більше не хотів бути необдуманим, перш ніж приймати важливі рішення, адже його довірливість прискорила все.","ru":"В будущем он больше не хотел быть необдуманным, прежде чем принимать важные решения, ведь его доверчивость ускорила всё."},{"de":"Ehe die Arglosigkeit verschwand, beschleunigte sich alles derart schnell, dass er künftig nie mehr gedankenlos handeln wollte.","ua":"Перш ніж довірливість зникла, все прискорилося настільки швидко, що у майбутньому він більше ніколи не хотів діяти необдумано.","ru":"Прежде чем доверчивость исчезла, всё ускорилось настолько быстро, что в будущем он больше никогда не хотел действовать необдуманно."},{"de":"Seine gedankenlose Arglosigkeit beschleunigte den Fehler, ehe er ihn bemerkte, und künftig schwor er sich, vorsichtiger zu sein.","ua":"Його необдумана довірливість прискорила помилку, перш ніж він її помітив, і у майбутньому він поклявся бути обережнішим.","ru":"Его необдуманная доверчивость ускорила ошибку, прежде чем он её заметил, и в будущем он поклялся быть осторожнее."}]},{"title":"🌟 Група 4: ordentlich · buchstäblich · hinunterlaufen · unwesentlich","sentences":[{"de":"Es war buchstäblich unwesentlich, dass der Regen ordentlich die Straße hinunterlief.","ua":"Було буквально несуттєво, що дощ акуратно стікав вулицею донизу.","ru":"Было буквально несущественно, что дождь аккуратно стекал по улице вниз."},{"de":"Die ordentliche Frau bemerkte buchstäblich jeden unwesentlichen Tropfen, der die Fensterscheibe hinunterlief.","ua":"Акуратна жінка буквально помічала кожну незначну краплю, яка стікала по шибці вниз.","ru":"Аккуратная женщина буквально замечала каждую незначительную каплю, которая стекала по стеклу вниз."},{"de":"Er lief buchstäblich den Hügel hinunter und hielt das Unwesentliche ordentlich im Kopf.","ua":"Він буквально збіг з пагорба донизу і акуратно тримав у голові все незначне.","ru":"Он буквально сбежал с холма вниз и аккуратно держал в голове всё несущественное."},{"de":"Buchstäblich jeder unwesentliche Gedanke lief ihm ordentlich durch den Kopf hinunter, bis er verschwand.","ua":"Буквально кожна незначна думка акуратно пробігала в нього через голову донизу, поки не зникала.","ru":"Буквально каждая незначительная мысль аккуратно пробегала у него через голову вниз, пока не исчезала."},{"de":"Das Wasser lief ordentlich hinunter, und buchstäblich jedes unwesentliche Hindernis wurde weggeschwemmt.","ua":"Вода акуратно стікала донизу, і буквально кожна незначна перешкода була змита.","ru":"Вода аккуратно стекала вниз, и буквально каждое несущественное препятствие было смыто."}]},{"title":"💫 Група 5: angesagt · die Vorliebe · mitunter · rätselhaft · ausgesetzt · umschlagen","sentences":[{"de":"Mitunter ist das Rätselhafteste an einem angesagten Ort, dass man seiner Vorliebe so ausgesetzt ist, bis die Stimmung umschlägt.","ua":"Інколи найзагадковіше в модному місці — те, що так піддаєшся своєму уподобанню, поки настрій різко не змінюється.","ru":"Порой самое загадочное в модном месте — что так подвергаешься своему пристрастию, пока настроение резко не меняется."},{"de":"Seine Vorliebe für rätselhaftes Verhalten war mitunter so angesagt, dass alle, die ihm ausgesetzt waren, innerlich umschlugen.","ua":"Його уподобання до загадкової поведінки було інколи настільки трендовим, що всі, хто йому піддавався, внутрішньо різко змінювалися.","ru":"Его пристрастие к загадочному поведению было порой настолько модным, что все, кто ему подвергался, внутренне резко менялись."},{"de":"Mitunter schlägt die Stimmung um, wenn man einer rätselhaften Vorliebe ausgesetzt wird, die gerade angesagt ist.","ua":"Інколи настрій різко змінюється, коли піддаєшся загадковому уподобанню, яке зараз у тренді.","ru":"Порой настроение резко меняется, когда подвергаешься загадочному пристрастию, которое сейчас в тренде."},{"de":"Das angesagte Café war rätselhaft leer, und mitunter fragte man sich, welcher Vorliebe man dort ausgesetzt war, bevor alles umschlug.","ua":"Модне кафе було загадково порожнє, і інколи думав, якому уподобанню там піддавався, перш ніж усе різко змінилося.","ru":"Модное кафе было загадочно пусто, и порой думал, какому пристрастию там подвергался, прежде чем всё резко изменилось."},{"de":"Wer einer rätselhaften Vorliebe mitunter ausgesetzt ist, merkt schnell, wie angesagt es sein kann, wenn die Lage umschlägt.","ua":"Той, хто інколи підданий загадковому уподобанню, швидко помічає, наскільки це може бути трендово, коли ситуація різко змінюється.","ru":"Тот, кто порой подвержен загадочному пристрастию, быстро замечает, насколько это может быть модно, когда ситуация резко меняется."}]},{"title":"🎭 Група 6: befangen · herablassend · der Wirt · jählings · mitnichten","sentences":[{"de":"Der Wirt wirkte befangen, als der herablassende Gast jählings mitnichten zufrieden war.","ua":"Господар виглядав збентеженим, коли зверхній гість раптово виявився аж ніяк не задоволеним.","ru":"Хозяин выглядел смущённым, когда высокомерный гость внезапно оказался отнюдь не доволен."},{"de":"Mitnichten ließ sich der Wirt von dem herablassenden Blick des Gastes befangen machen, obwohl dieser jählings aufstand.","ua":"Аж ніяк не дозволив господар зверхньому погляду гостя збентежити себе, хоча той раптово встав.","ru":"Отнюдь не позволил хозяин высокомерному взгляду гостя смутить себя, хотя тот внезапно встал."},{"de":"Jählings wurde der Wirt befangen, als der herablassende Fremde mitnichten seinen Namen nennen wollte.","ua":"Господар раптово збентежився, коли зверхній незнайомець аж ніяк не хотів називати своє ім'я.","ru":"Хозяин внезапно смутился, когда высокомерный незнакомец отнюдь не хотел называть своё имя."},{"de":"Der herablassende Ton des Gastes machte den Wirt befangen, doch jählings schlug die Stimmung um — mitnichten zum Guten.","ua":"Зверхній тон гостя збентежив господаря, але раптово настрій змінився — аж ніяк не на краще.","ru":"Высокомерный тон гостя смутил хозяина, но внезапно настроение изменилось — отнюдь не к лучшему."},{"de":"Befangen und still stand der Wirt da, während der herablassende Mann jählings erklärte, er wolle mitnichten bleiben.","ua":"Збентежений і тихий стояв господар, поки зверхній чоловік раптово заявив, що аж ніяк не хоче залишатися.","ru":"Смущённый и тихий стоял хозяин, пока высокомерный мужчина внезапно заявил, что отнюдь не хочет оставаться."}]},{"title":"🌈 Група 7: vorwerfen · verabscheuen · träge · allerlei · niedlich","sentences":[{"de":"Er warf ihr allerlei Dinge vor, obwohl sie das träge Verhalten verabscheute und nur niedlich wirken wollte.","ua":"Він докоряв їй за всілякі речі, хоча вона відчувала огиду до млявої поведінки і хотіла лише виглядати милою.","ru":"Он упрекал её за всякие вещи, хотя она испытывала отвращение к вялому поведению и хотела лишь казаться милой."},{"de":"Allerlei niedliche Dinge konnte man ihr nicht vorwerfen, doch ihre träge Art verabscheuten viele.","ua":"Всілякі милі речі не можна було їй закидати, але багато хто відчував огиду до її млявої натури.","ru":"Всякие милые вещи нельзя было ей поставить в упрёк, но многие испытывали отвращение к её вялой натуре."},{"de":"Sie verabscheute es, wenn man ihr vorwarf, träge zu sein, dabei liebte sie allerlei niedliche Ablenkungen.","ua":"Вона відчувала огиду, коли їй закидали лінь, хоча насправді вона любила всілякі милі розваги.","ru":"Она испытывала отвращение, когда её упрекали в лени, хотя на самом деле любила всякие милые развлечения."},{"de":"Träge saß er da, umgeben von allerlei niedlichen Dingen, und konnte niemandem etwas vorwerfen, was er selbst verabscheute.","ua":"Млявий, він сидів, оточений всілякими милими речами, і не міг нікому докоряти за те, що сам ненавидів.","ru":"Вялый, он сидел, окружённый всякими милыми вещами, и не мог никому ставить в упрёк то, что сам ненавидел."},{"de":"Allerlei Vorwürfe verabscheute sie, besonders wenn man ihr vorwarf, zu träge für so niedliche Träume zu sein.","ua":"Вона ненавиділа всілякі докори, особливо коли їй закидали, що вона занадто млява для таких милих мрій.","ru":"Она ненавидела всякие упрёки, особенно когда ей ставили в упрёк, что она слишком вялая для таких милых мечтаний."}]},{"title":"🍂 Група 8: herauskommen · genüsslich · äußerst · der Abfall · mürrisch","sentences":[{"de":"Äußerst mürrisch kam er heraus und trank genüsslich seinen Kaffee, ohne den Abfall zu bemerken.","ua":"Надзвичайно буркотливий, він вийшов і із задоволенням пив каву, не помічаючи сміття.","ru":"Крайне ворчливый, он вышел и с наслаждением пил кофе, не замечая мусора."},{"de":"Als herausskam, dass der mürrische Mann genüsslich äußerst teuren Wein trank, lag der Abfall noch auf dem Boden.","ua":"Коли виявилося, що буркотливий чоловік із задоволенням смакував надзвичайно дорогий вайн, сміття ще лежало на підлозі.","ru":"Когда выяснилось, что ворчливый мужчина с наслаждением смаковал крайне дорогое вино, мусор ещё лежал на полу."},{"de":"Genüsslich aß er, obwohl es äußerst seltsam herauskam, dass er den Abfall einfach ignorierte und mürrisch schwieg.","ua":"Він із задоволенням їв, хоча виявилося надзвичайно дивним, що він просто ігнорував сміття і буркотливо мовчав.","ru":"Он с наслаждением ел, хотя выяснилось крайне странным, что он просто игнорировал мусор и ворчливо молчал."},{"de":"Der mürrische Nachbar kam äußerst aufgebracht heraus, als genüsslich jemand seinen Abfall auf die Straße warf.","ua":"Буркотливий сусід надзвичайно обурено вийшов, коли хтось із задоволенням викидав його сміття на вулицю.","ru":"Ворчливый сосед вышел крайне возмущённым, когда кто-то с наслаждением выбрасывал его мусор на улицу."},{"de":"Es kam äußerst unangenehm heraus: mürrisch und genüsslich zugleich sortierte er den Abfall in der Küche.","ua":"Виявилося надзвичайно неприємно: буркотливий і водночас із задоволенням він сортував сміття на кухні.","ru":"Выяснилось крайне неприятное: ворчливый и одновременно с наслаждением он сортировал мусор на кухне."}]}];
function getTrans(w){return _lang==="ru"?w.ru:w.ua;}
function getEx(w){return _lang==="ru"?w.exRu:w.exUa;}
function getExLabel(){return _lang==="ru"?"Пример:":"Приклад:";}
function getSentTrans(s){return _lang==="ru"?s.ru:s.ua;}
function showToast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2200);}
function confetti(){var c=["#6c63ff","#ff6584","#ffbe0b","#4caf50","#00bcd4"];for(var i=0;i<28;i++){var el=document.createElement("div");el.className="confetti-piece";el.style.cssText="left:"+(Math.random()*100)+"vw;top:-10px;background:"+c[Math.floor(Math.random()*5)]+";animation-delay:"+(Math.random()*0.6)+"s;width:"+(6+Math.random()*8)+"px;height:"+(6+Math.random()*8)+"px;";document.body.appendChild(el);setTimeout(function(){el.remove();},2000);}}
function updateStats(){var total=0;_groups.forEach(function(g){total+=g.sentences.length;});document.getElementById("stat-total").textContent=_words.length;document.getElementById("stat-learned").textContent=_words.filter(function(w){return w.learned;}).length;document.getElementById("stat-sentences").textContent=total;document.getElementById("stat-streak").textContent=_quizStreak+"🔥";}
function setLang(l){_lang=l;document.getElementById("lang-ua").classList.toggle("active",l==="ua");document.getElementById("lang-ru").classList.toggle("active",l==="ru");renderWords();renderSentences();var qs=document.getElementById("quiz-section");if(qs&&qs.classList.contains("active"))startQuiz();}
function switchTab(tab){["words","sentences","quiz"].forEach(function(t){document.getElementById("tab-"+t).classList.toggle("active",t===tab);document.getElementById(t+"-section").classList.toggle("active",t===tab);});if(tab==="quiz")startQuiz();}
function renderWords(){
  var q=(document.getElementById("searchInput").value||"").toLowerCase();
  var c=document.getElementById("cards");
  c.innerHTML="";
  var f=_words.filter(function(w){return !q||w.word.toLowerCase().includes(q)||getTrans(w).toLowerCase().includes(q);});
  if(!f.length){c.innerHTML='<div class="empty">Нічого не знайдено 🤷</div>';return;}
  f.forEach(function(item){
    var i=_words.indexOf(item);
    var card=document.createElement("div");
    card.className="card"+(item.learned?" learned":"");
    var delBtn=document.createElement("button");
    delBtn.className="delete-btn";
    delBtn.textContent="✕";
    delBtn.addEventListener("click",function(e){e.stopPropagation();_words.splice(i,1);renderWords();});
    var wordDiv=document.createElement("div");
    wordDiv.className="word";
    wordDiv.textContent=item.word;
    var transDiv=document.createElement("div");
    transDiv.className="translation";
    transDiv.textContent=getTrans(item);
    var exDiv=document.createElement("div");
    exDiv.className="example";
    var exLabel=document.createElement("span");
    exLabel.className="ex-label";
    exLabel.textContent=getExLabel();
    exDiv.appendChild(exLabel);
    exDiv.appendChild(document.createTextNode(getEx(item)));
    var actDiv=document.createElement("div");
    actDiv.className="card-actions";
    var learnBtn=document.createElement("button");
    learnBtn.className="btn-learn"+(item.learned?" done":"");
    learnBtn.textContent=item.learned?"✅ Вивчено":"📌 Вивчив";
    learnBtn.addEventListener("click",function(e){e.stopPropagation();_words[i].learned=!_words[i].learned;if(_words[i].learned){confetti();showToast("🎉 Відмічено як вивчене!");}renderWords();});
    actDiv.appendChild(learnBtn);
    card.appendChild(delBtn);
    card.appendChild(wordDiv);
    card.appendChild(transDiv);
    card.appendChild(exDiv);
    if(item.learned){var badge=document.createElement("div");badge.className="learned-badge";badge.textContent="✅ Вивчено";card.appendChild(badge);}else{var hint=document.createElement("div");hint.className="hint";hint.textContent="👆 натисни";card.appendChild(hint);}
    card.appendChild(actDiv);
    card.addEventListener("click",function(){this.classList.toggle("flipped");var h=this.querySelector(".hint");if(h)h.style.display=this.classList.contains("flipped")?"none":"block";});
    c.appendChild(card);
  });
  updateStats();
}
function addWord(){var w=document.getElementById("wordInput").value.trim(),ua=document.getElementById("transUaInput").value.trim(),ru=document.getElementById("transRuInput").value.trim();if(!w)return;_words.push({word:w,ua:ua||"—",ru:ru||"—",learned:false,exDe:"",exUa:"",exRu:""});document.getElementById("wordInput").value="";document.getElementById("transUaInput").value="";document.getElementById("transRuInput").value="";showToast("✅ Слово додано!");renderWords();}
function renderSentences(){
  var wrap=document.getElementById("sentences-wrap");
  wrap.innerHTML="";
  _groups.forEach(function(group,gi){
    var sec=document.createElement("div");
    sec.style.marginBottom="28px";
    var title=document.createElement("div");
    title.className="group-title";
    title.textContent=group.title;
    sec.appendChild(title);
    var nav=document.createElement("div");
    nav.className="sent-nav";
    var btnPrev=document.createElement("button");
    btnPrev.textContent="←";
    var counter=document.createElement("span");
    counter.className="sent-counter";
    var btnNext=document.createElement("button");
    btnNext.textContent="→";
    nav.appendChild(btnPrev);
    nav.appendChild(counter);
    nav.appendChild(btnNext);
    sec.appendChild(nav);
    var cardArea=document.createElement("div");
    sec.appendChild(cardArea);
    wrap.appendChild(sec);
    var idx=0;
    function showCard(){
      var s=group.sentences[idx];
      counter.textContent=(idx+1)+" / "+group.sentences.length;
      btnPrev.disabled=(idx===0);
      btnNext.disabled=(idx===group.sentences.length-1);
      cardArea.innerHTML="";
      var card=document.createElement("div");
      card.className="sentence-card";
      var numDiv=document.createElement("div");
      numDiv.className="num";
      numDiv.textContent="№ "+(idx+1);
      var deDiv=document.createElement("div");
      deDiv.className="de";
      deDiv.textContent=s.de;
      var transDiv=document.createElement("div");
      transDiv.className="trans";
      transDiv.textContent=getSentTrans(s);
      var hintDiv=document.createElement("div");
      hintDiv.className="s-hint";
      hintDiv.textContent="👆 натисни, щоб побачити переклад";
      card.appendChild(numDiv);
      card.appendChild(deDiv);
      card.appendChild(transDiv);
      card.appendChild(hintDiv);
      card.addEventListener("click",function(){this.classList.toggle("flipped");});
      cardArea.appendChild(card);
    }
    btnPrev.addEventListener("click",function(){if(idx>0){idx--;showCard();}});
    btnNext.addEventListener("click",function(){if(idx<group.sentences.length-1){idx++;showCard();}});
    showCard();
  });
  updateStats();
}
function startQuiz(){
  var u=_words.filter(function(w){return !w.learned;});
  if(u.length<2){
    var area=document.getElementById("quiz-area");
    area.innerHTML="";
    var qcard=document.createElement("div");
    qcard.className="quiz-card";
    var qq=document.createElement("div");
    qq.className="quiz-question";
    qq.textContent="🎉 Всі слова вивчені!";
    qcard.appendChild(qq);
    area.appendChild(qcard);
    var btns=document.createElement("div");
    btns.className="quiz-btns";
    var b=document.createElement("button");
    b.className="btn-show";
    b.textContent="← До слів";
    b.addEventListener("click",function(){switchTab("words");});
    btns.appendChild(b);
    area.appendChild(btns);
    return;
  }
  _quizOrder=u.map(function(w){return _words.indexOf(w);}).sort(function(){return Math.random()-0.5;});
  _quizIndex=0;_quizScore=0;
  showQuizCard();
}
function showQuizCard(){
  var area=document.getElementById("quiz-area");
  area.innerHTML="";
  if(_quizIndex>=_quizOrder.length){
    var pct=Math.round((_quizScore/_quizOrder.length)*100);
    var qcard=document.createElement("div");qcard.className="quiz-card";
    var qq=document.createElement("div");qq.className="quiz-question";qq.textContent=_quizScore+"/"+_quizOrder.length;qcard.appendChild(qq);
    var qs=document.createElement("div");qs.className="quiz-sub";qs.textContent=(pct>=80?"🔥 Відмінно!":pct>=50?"👍 Непогано!":"💪 Продовжуй!")+" "+pct+"%";qcard.appendChild(qs);
    var pb=document.createElement("div");pb.className="progress-bar";var pf=document.createElement("div");pf.className="progress-fill";pf.style.width=pct+"%";pb.appendChild(pf);qcard.appendChild(pb);
    area.appendChild(qcard);
    var btns=document.createElement("div");btns.className="quiz-btns";
    var b1=document.createElement("button");b1.className="btn-show";b1.textContent="🔄 Ще раз";b1.addEventListener("click",startQuiz);btns.appendChild(b1);
    var b2=document.createElement("button");b2.className="btn-correct";b2.textContent="← До слів";b2.addEventListener("click",function(){switchTab("words");});btns.appendChild(b2);
    area.appendChild(btns);
    if(pct>=80)confetti();
    return;
  }
  var w=_words[_quizOrder[_quizIndex]];
  var pct=Math.round((_quizIndex/_quizOrder.length)*100);
  var prog=document.createElement("div");prog.className="quiz-progress";prog.textContent=(_quizIndex+1)+" / "+_quizOrder.length;area.appendChild(prog);
  var score=document.createElement("div");score.className="quiz-score";score.textContent="✅ "+_quizScore+" вірних | 🔥 "+_quizStreak+" підряд";area.appendChild(score);
  var pb=document.createElement("div");pb.className="progress-bar";var pf=document.createElement("div");pf.className="progress-fill";pf.style.width=pct+"%";pb.appendChild(pf);area.appendChild(pb);
  var qcard=document.createElement("div");qcard.className="quiz-card";
  var qs=document.createElement("div");qs.className="quiz-sub";qs.textContent="Як перекладається?";qcard.appendChild(qs);
  var qq=document.createElement("div");qq.className="quiz-question";qq.textContent=w.word;qcard.appendChild(qq);
  var ans=document.createElement("div");ans.className="quiz-answer";ans.id="quiz-ans";
  ans.textContent=getTrans(w);
  var exem=document.createElement("em");exem.style.cssText="font-size:12px;color:#aaa;display:block;margin-top:6px";exem.textContent=getEx(w);ans.appendChild(exem);
  qcard.appendChild(ans);
  area.appendChild(qcard);
  var btns=document.createElement("div");btns.className="quiz-btns";
  var bShow=document.createElement("button");bShow.className="btn-show";bShow.textContent="👁 Показати";
  var bOk=document.createElement("button");bOk.className="btn-correct";bOk.textContent="✅ Знав";bOk.style.display="none";
  var bNo=document.createElement("button");bNo.className="btn-wrong";bNo.textContent="❌ Не знав";bNo.style.display="none";
  bShow.addEventListener("click",function(){ans.style.display="block";bShow.style.display="none";bOk.style.display="inline-block";bNo.style.display="inline-block";});
  bOk.addEventListener("click",function(){_quizScore++;_quizStreak++;showToast("🎉 Правильно!");if(_quizStreak%3===0)confetti();updateStats();_quizIndex++;setTimeout(showQuizCard,400);});
  bNo.addEventListener("click",function(){_quizStreak=0;showToast("❌ Наступного разу!");updateStats();_quizIndex++;setTimeout(showQuizCard,400);});
  btns.appendChild(bShow);btns.appendChild(bOk);btns.appendChild(bNo);
  area.appendChild(btns);
}
renderWords();renderSentences();updateStats();
</script>

<script>
(function(){
  function _save(){try{localStorage.setItem('jane_words',JSON.stringify(_words));localStorage.setItem('jane_groups',JSON.stringify(_groups));}catch(e){}}
  function _load(){
    try{
      var sw=localStorage.getItem('jane_words');
      var sg=localStorage.getItem('jane_groups');
      if(sw){var pw=JSON.parse(sw);var orig=_words.map(function(w){return w.word;});pw.forEach(function(w){var i=orig.indexOf(w.word);if(i===-1){_words.push(w);}else{_words[i].learned=w.learned;}});}
      if(sg){var pg=JSON.parse(sg);var origT=_groups.map(function(g){return g.title;});pg.forEach(function(g){if(origT.indexOf(g.title)===-1){_groups.push(g);}});}
    }catch(e){}
  }
  var _oa=window.addWord;window.addWord=function(){_oa();_save();};
  var _or=window.renderWords;window.renderWords=function(){_or();document.querySelectorAll('.delete-btn').forEach(function(b){b.addEventListener('click',function(){setTimeout(_save,100);});});document.querySelectorAll('.btn-learn').forEach(function(b){b.addEventListener('click',function(){setTimeout(_save,100);});});};
  _load();renderWords();renderSentences();updateStats();
})();
</script>
