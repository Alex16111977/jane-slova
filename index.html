<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jane-slova</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:#f0f4ff;min-height:100vh;padding:24px 20px;}
h1{text-align:center;color:#3a3a6e;margin-bottom:4px;font-size:26px;}
.subtitle{text-align:center;color:#888;margin-bottom:16px;font-size:13px;}
.stats{display:flex;justify-content:center;gap:16px;margin-bottom:16px;flex-wrap:wrap;}
.stat{background:white;border-radius:12px;padding:9px 18px;font-size:12px;color:#555;box-shadow:0 2px 8px rgba(108,99,255,0.08);text-align:center;}
.stat strong{display:block;font-size:19px;color:#6c63ff;}
.lang-bar{display:flex;justify-content:center;align-items:center;gap:10px;margin-ottom:14px;font-size:13px;color:#888;}
.lang-switch{display:flex;background:#e8e8f8;border-radius:20px;padding:3px;gap:2px;}
.lang-switch button{padding:6px 16px;border:none;border-radius:16px;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:#888;transition:all 0.2s;}
.lang-switch button.active{background:#6c63ff;color:white;box-shadow:0 2px 8px rgba(108,99,255,0.25);}
.tabs{display:flex;justify-content:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.tab-btn{padding:9px 20px;border-radius:20px;border:2px solid #6c63ff;background:white;color:#6c63ff;font-size:14px;cursor:pointer;font-weight:600;transition:all 0.2s;}
.tab-btn.active{background:#6c63ff;color:white;}
.add-form{display:flex;gap:10px;max-width:750px;margin:0 auto 20px;flex-wrap:wrap;}
.add-form input,.add-form textarea{flex:1;padding:11px 14px;border:2px solid #c5cee0;border-radius:12px;font-size:14px;outline:none;transition:border 0.2s;min-width:120px;font-family:inherit;resize:vertical;}
.add-form input:focus,.add-form textarea:focus{border-color:#6c63ff;}
.add-form button{padding:11px 20px;background:#6c63ff;color:white;border:none;border-radius:12px;font-size:14px;cursor:pointer;transition:background 0.2s;align-self:flex-end;white-space:nowrap;}
.add-form button:hover{background:#574fd6;}
.search-bar{max-width:750px;margin:0 auto 18px;}
.search-bar input{width:100%;padding:10px 16px;border:2px solid #c5cee0;border-radius:12px;font-size:14px;outline:none;font-family:inherit;transition:border 0.2s;}
.search-bar input:focus{border-color:#6c63ff;}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:16px;max-width:900px;margin:0 auto;}
.card{background:white;border-radius:16px;padding:20px 18px;box-shadow:0 4px 15px rgba(108,99,255,0.08);cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;position:relative;min-height:115px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;user-select:none;}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(108,99,255,0.16);}
.card.learned{border:2px solid #4caf50;background:#f8fff8;}
.card .word{font-size:20px;font-weight:700;color:#3a3a6e;margin-bottom:6px;}
.card .translation{font-size:14px;color:#6c63ff;display:none;margin-top:2px;}
.card.flipped .translation{display:block;}
.card.flipped .word{color:#aaa;font-size:13px;}
.card .hint{font-size:10px;color:#ccc;margin-top:6px;}
.card .example{font-size:12px;color:#999;margin-top:8px;font-style:italic;line-height:1.4;display:none;text-align:left;padding:6px 10px;background:#f7f7ff;border-radius:8px;border-left:3px solid #6c63ff;width:100%;}
.card.flipped .example{display:block;}
.card .ex-label{font-size:10px;font-weight:700;color:#6c63ff;text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:3px;font-style:normal;}
.card .learned-badge{font-size:10px;color:#4caf50;font-weight:700;margin-top:5px;}
.card-actions{display:flex;gap:6px;margin-top:8px;}
.card-actions button{font-size:12px;padding:4px 10px;border-radius:8px;border:none;cursor:pointer;transition:all 0.2s;}
.btn-learn{background:#e8f5e9;color:#4caf50;}
.btn-learn:hover,.btn-learn.done{background:#4caf50;color:white;}
.sentences{display:flex;flex-direction:column;gap:14px;max-width:820px;margin:0 auto;}
.sentence-card{background:white;border-radius:16px;padding:18px 22px;box-shadow:0 4px 15px rgba(108,99,255,0.08);cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;position:relative;}
.sentence-card:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(108,99,255,0.16);}
.sentence-card .num{font-size:11px;font-weight:700;color:#6c63ff;letter-spacing:1px;margin-bottom:6px;text-transform:uppercase;}
.sentence-card .de{font-size:15px;font-weight:600;color:#3a3a6e;line-height:1.6;}
.sentence-card .trans{font-size:14px;color:#6c63ff;line-height:1.6;margin-top:10px;padding-top:10px;border-top:1px dashed #e0e0f0;display:none;}
.sentence-card.flipped .trans{display:block;}
.s-hint{font-size:10px;color:#ccc;margin-top:6px;}
.quiz-area{max-width:600px;margin:0 auto;text-align:center;}
.quiz-card{background:white;border-radius:20px;padding:38px 30px;box-shadow:0 6px 25px rgba(108,99,255,0.12);margin-bottom:22px;min-height:175px;display:flex;flex-direction:column;justify-content:center;align-items:center;}
.quiz-question{font-size:26px;font-weight:700;color:#3a3a6e;margin-bottom:6px;}
.quiz-sub{font-size:13px;color:#aaa;margin-bottom:16px;}
.quiz-answer{display:none;font-size:17px;color:#6c63ff;margin-top:14px;padding:12px;background:#f0eeff;border-radius:12px;width:100%;}
.quiz-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.quiz-btns button{padding:11px 26px;border-radius:12px;border:none;font-size:14px;cursor:pointer;font-weight:600;transition:all 0.2s;}
.btn-show{background:#6c63ff;color:white;}
.btn-show:hover{background:#574fd6;}
.btn-correct{background:#e8f5e9;color:#4caf50;}
.btn-correct:hover{background:#4caf50;color:white;}
.btn-wrong{background:#ffeaea;color:#e53935;}
.btn-wrong:hover{background:#e53935;color:white;}
.quiz-progress{font-size:13px;color:#aaa;margin-bottom:12px;}
.quiz-score{font-size:14px;font-weight:600;color:#3a3a6e;margin-bottom:12px;}
.progress-bar{background:#e0e0f0;border-radius:10px;height:7px;margin-bottom:18px;overflow:hidden;}
.progress-fill{background:#6c63ff;height:100%;border-radius:10px;transition:width 0.4s;}
.delete-btn{position:absolute;top:9px;right:11px;background:none;border:none;color:#ddd;font-size:16px;cursor:pointer;transition:color 0.2s;line-height:1;}
.delete-btn:hover{color:#ff6b6b;}
.section{display:none;}
.section.active{display:block;}
.empty{text-align:center;color:#bbb;padding:40px;font-size:15px;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);background:#3a3a6e;color:white;padding:11px 22px;border-radius:14px;font-size:14px;font-weight:600;opacity:0;transition:all 0.3s;pointer-events:none;z-index:9999;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.confetti-piece{position:fixed;width:10px;height:10px;border-radius:2px;animation:fall 1.5s ease-in forwards;pointer-events:none;z-index:9999;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}
</style>
</head>
<body>
<h1>jane-slova</h1>
<p class="subtitle">Натисни на карточку, щоб побачити переклад</p>
<div class="stats">
  <div class="stat"><strong id="stat-total">0</strong>слів</div>
  <div class="stat"><strong id="stat-learned">0</strong>вивчено</div>
  <div class="stat"><strong id="stat-sentences">0</strong>речень</div>
  <div class="stat"><strong id="stat-streak">0🔥</strong>підряд</div>
</div>
<div class="lang-bar">
  <span>Мова перекладу:</span>
  <div class="lang-switch">
    <button id="lang-ua" class="active" onclick="setLang('ua')">🇺🇦 Українська</button>
    <button id="lang-ru" onclick="setLang('ru')">🇷🇺 Русский</button>
  </div>
</div>
<div class="tabs">
  <button class="tab-btn active" id="tab-words" onclick="switchTab('words')">🔤 Слова</button>
  <button class="tab-btn" id="tab-sentences" onclick="switchTab('sentences')">📝 Речення</button>
  <button class="tab-btn" id="tab-quiz" onclick="switchTab('quiz')">🎯 Квіз</button>
</div>
<div class="section active" id="words-section">
  <div class="search-bar"><input type="text" id="searchInput" placeholder="🔍 Пошук слів..." oninput="renderWords()"/></div>
  <div class="add-form">
    <input type="text" id="wordInput" placeholder="Слово"/>
    <input type="text" id="transUaInput" placeholder="Переклад UA"/>
    <input type="text" id="transRuInput" placeholder="Перевод RU"/>
    <button onclick="addWord()">+ Додати</button>
  </div>
  <div class="cards" id="cards"></div>
</div>
<div class="section" id="sentences-section">
  <div class="add-form">
    <textarea id="deInput" rows="2" placeholder="Речення німецькою..." style="flex:2"></textarea>
    <textarea id="uaInput" rows="2" placeholder="Переклад UA..." style="flex:2"></textarea>
    <textarea id="ruInput" rows="2" placeholder="Перевод RU..." style="flex:2"></textarea>
    <button onclick="addSentence()">+ Додати</button>
  </div>
  <div class="sentences" id="sentences"></div>
</div>
<div class="section" id="quiz-section"><div class="quiz-area" id="quiz-area"></div></div>
<div class="toast" id="toast"></div>
<script>
var _lang="ua",_quizStreak=0,_quizScore=0,_quizIndex=0,_quizOrder=[];
var _words=[{"word":"sichtlich","ua":"очевидно, явно","ru":"очевидно, явно","learned":false,"exDe":"Er war sichtlich erschöpft nach der langen Reise.","exUa":"Він був явно виснажений після довгої подорожі.","exRu":"Он был явно измотан после долгой поездки."},{"word":"derart","ua":"настільки, таким чином","ru":"настолько, таким образом","learned":false,"exDe":"Das Wasser war derart kalt, dass ich sofort aufgehört habe zu schwimmen.","exUa":"Вода була настільки холодною, що я одразу перестав плавати.","exRu":"Вода была настолько холодной, что я сразу перестал плавать."},{"word":"beinahe","ua":"майже, мало не","ru":"почти, едва не","learned":false,"exDe":"Ich hätte beinahe den Zug verpasst.","exUa":"Я мало не пропустив поїзд.","exRu":"Я едва не опоздал на поезд."},{"word":"ausrenken","ua":"вивихнути, викрутити","ru":"вывихнуть, выкрутить","learned":false,"exDe":"Er hat sich beim Sport den Arm ausgerenkt.","exUa":"Він вивихнув руку під час занять спортом.","exRu":"Он вывихнул руку во время тренировки."},{"word":"fürchten","ua":"боятися, побоюватися","ru":"бояться, опасаться","learned":false,"exDe":"Die Kinder fürchten sich im Dunkeln.","exUa":"Діти бояться темряви.","exRu":"Дети боятся темноты."},{"word":"geschmeidig","ua":"гнучкий, пластичний","ru":"гибкий, пластичный","learned":false,"exDe":"Die Katze bewegt sich geschmeidig durch den Raum.","exUa":"Кіт рухається гнучко по кімнаті.","exRu":"Кошка гибко движется по комнате."},{"word":"grausam","ua":"жорстокий, страшний","ru":"жестокий, ужасный","learned":false,"exDe":"Der Winter war dieses Jahr grausam kalt.","exUa":"Цього року зима була жорстоко холодною.","exRu":"Этой зимой было жестоко холодно."},{"word":"die Unwissenheit","ua":"незнання, невігластво","ru":"незнание, невежество","learned":false,"exDe":"Unwissenheit schützt nicht vor Strafe.","exUa":"Незнання закону не звільняє від відповідальності.","exRu":"Незнание закона не освобождает от ответственности."},{"word":"die Tatsache","ua":"факт, дійсність","ru":"факт, действительность","learned":false,"exDe":"Es ist eine Tatsache, dass die Erde rund ist.","exUa":"Це факт, що Земля кругла.","exRu":"Это факт, что Земля круглая."},{"word":"hektisch","ua":"метушливий, хаотичний","ru":"суетливый, хаотичный","learned":false,"exDe":"Der Montagmorgen ist immer sehr hektisch.","exUa":"Понеділковий ранок завжди дуже метушливий.","exRu":"Понедельничное утро всегда очень суетливое."},{"word":"unmittelbar","ua":"безпосередній, одразу","ru":"непосредственный, сразу","learned":false,"exDe":"Er reagierte unmittelbar auf die Nachricht.","exUa":"Він відреагував одразу на новину.","exRu":"Он отреагировал сразу на новость."}];
var _sentences=[{"de":"Wir müssen klare Regeln setzen, weil ich es vorziehen würde, nicht ständig nur zuzusehen, wie erstaunlich schnell sich alles verändert.","ua":"Ми повинні встановити чіткі правила, тому що я б віддала перевагу не просто постійно спостерігати, як усе дивовижно швидко змінюється.","ru":"Мы должны установить чёткие правила, потому что я бы предпочла не просто постоянно наблюдать, как всё удивительно быстро меняется."},{"de":"Der Lehrer musste eine klare Grenze setzen, weil die Schüler ständig nur zusehen wollten, obwohl es erstaunlich wichtig war mitzuarbeiten, und ich würde es vorziehen, Verantwortung zu übernehmen.","ua":"Учитель повинен був встановити чітку межу, тому що учні постійно хотіли лише спостерігати, хоча було дивовижно важливо працювати разом, і я б віддала перевагу взяти відповідальність.","ru":"Учитель должен был установить чёткую границу, потому что ученики постоянно хотели лишь наблюдать, хотя было удивительно важно работать вместе, и я бы предпочла взять ответственность."},{"de":"Man sollte sich realistische Ziele setzen, statt ständig nur anderen zuzusehen, auch wenn ihr Erfolg erstaunlich erscheint, und ich würde es vorziehen, selbst zu handeln.","ua":"Слід встановлювати реалістичні цілі замість того, щоб постійно лише спостерігати за іншими, навіть якщо їхній успіх здається дивовижним, і я б віддала перевагу діяти самостійно.","ru":"Следует ставить реалистичные цели вместо того, чтобы постоянно лишь наблюдать за другими, даже если их успех кажется удивительным, и я бы предпочла действовать самостоятельно."},{"de":"Die Regierung will neue Maßnahmen setzen, weil sie es nicht vorziehen kann, ständig nur zuzusehen, wie sich die Situation erstaunlich schnell entwickelt.","ua":"Уряд хоче запровадити нові заходи, тому що він не може надавати перевагу тому, щоб постійно лише спостерігати, як ситуація дивовижно швидко розвивається.","ru":"Правительство хочет ввести новые меры, потому что оно не может предпочитать постоянно лишь наблюдать, как ситуация удивительно быстро развивается."},{"de":"Es war grausam kalt, unmittelbar nachdem wir die Tatsache erkannt hatten, dass niemand uns helfen würde.","ua":"Було жорстоко холодно, одразу після того, як ми усвідомили факт, що ніхто нам не допоможе.","ru":"Было жестоко холодно, сразу после того, как мы осознали факт, что никто нам не поможет."}];
function getTrans(w){return _lang==='ru'?w.ru:w.ua;}
function getEx(w){return _lang==='ru'?w.exRu:w.exUa;}
function getExLabel(){return _lang==='ru'?'\u041f\u0440\u0438\u043c\u0435\u0440:':'\u041f\u0440\u0438\u043a\u043b\u0430\u0434:';}
function getSentTrans(s){return _lang==='ru'?s.ru:s.ua;}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}
function confetti(){var c=['#6c63ff','#ff6584','#ffbe0b','#4caf50','#00bcd4'];for(var i=0;i<28;i++){var el=document.createElement('div');el.className='confetti-piece';el.style.cssText='left:'+(Math.random()*100)+'vw;top:-10px;background:'+c[Math.floor(Math.random()*5)]+';animation-delay:'+(Math.random()*0.6)+'s;width:'+(6+Math.random()*8)+'px;height:'+(6+Math.random()*8)+'px;';document.body.appendChild(el);setTimeout(function(){el.remove();},2000);}}
function updateStats(){document.getElementById('stat-total').textContent=_words.length;document.getElementById('stat-learned').textContent=_words.filter(function(w){return w.learned;}).length;document.getElementById('stat-sentences').textContent=_sentences.length;document.getElementById('stat-streak').textContent=_quizStreak+'🔥';}
function setLang(l){_lang=l;document.getElementById('lang-ua').classList.toggle('active',l==='ua');document.getElementById('lang-ru').classList.toggle('active',l==='ru');renderWords();renderSentences();var qs=document.getElementById('quiz-section');if(qs&&qs.classList.contains('active'))startQuiz();}
function switchTab(tab){['words','sentences','quiz'].forEach(function(t){document.getElementById('tab-'+t).classList.toggle('active',t===tab);document.getElementById(t+'-section').classList.toggle('active',t===tab);});if(tab==='quiz')startQuiz();}
function renderWords(){var q=(document.getElementById('searchInput').value||'').toLowerCase();var c=document.getElementById('cards');c.innerHTML='';var f=_words.filter(function(w){return !q||w.word.toLowerCase().includes(q)||getTrans(w).toLowerCase().includes(q);});if(!f.length){c.innerHTML='<div class="empty">Нічого не знайдено 🤷</div>';return;}f.forEach(function(item){var i=_words.indexOf(item);var card=document.createElement('div');card.className='card'+(item.learned?' learned':'');card.innerHTML='<button class="delete-btn" data-i="'+i+'">✕</button><div class="word">'+item.word+'</div><div class="translation">'+getTrans(item)+'</div><div class="example"><span class="ex-label">'+getExLabel()+'</span>'+getEx(item)+'</div>'+(item.learned?'<div class="learned-badge">✅ Вивчено</div>':'<div class="hint">👆 натисни</div>')+'<div class="card-actions"><button class="btn-learn'+(item.learned?' done':'')+'" data-li="'+i+'">'+(item.learned?'✅ Вивчено':'📌 Вивчив')+'</button></div>';card.querySelector('.delete-btn').addEventListener('click',function(e){e.stopPropagation();_words.splice(parseInt(this.dataset.i),1);renderWords();});card.querySelector('.btn-learn').addEventListener('click',function(e){e.stopPropagation();var idx=parseInt(this.dataset.li);_words[idx].learned=!_words[idx].learned;if(_words[idx].learned){confetti();showToast('🎉 Відмічено як вивчене!');}renderWords();});card.addEventListener('click',function(){this.classList.toggle('flipped');var h=this.querySelector('.hint');if(h)h.style.display=this.classList.contains('flipped')?'none':'block';});c.appendChild(card);});updateStats();}
function addWord(){var w=document.getElementById('wordInput').value.trim(),ua=document.getElementById('transUaInput').value.trim(),ru=document.getElementById('transRuInput').value.trim();if(!w)return;_words.push({word:w,ua:ua||'—',ru:ru||'—',learned:false,exDe:'',exUa:'',exRu:''});document.getElementById('wordInput').value='';document.getElementById('transUaInput').value='';document.getElementById('transRuInput').value='';showToast('✅ Слово додано!');renderWords();}
function renderSentences(){var c=document.getElementById('sentences');c.innerHTML='';if(!_sentences.length){c.innerHTML='<div class="empty">Немає речень 📝</div>';return;}_sentences.forEach(function(item,i){var card=document.createElement('div');card.className='sentence-card';card.innerHTML='<button class="delete-btn" data-si="'+i+'">✕</button><div class="num">№ '+(i+1)+'</div><div class="de">'+item.de+'</div><div class="trans">'+getSentTrans(item)+'</div><div class="s-hint">👆 натисни, щоб побачити переклад</div>';card.querySelector('.delete-btn').addEventListener('click',function(e){e.stopPropagation();_sentences.splice(parseInt(this.dataset.si),1);renderSentences();});card.addEventListener('click',function(e){if(e.target.classList.contains('delete-btn'))return;this.classList.toggle('flipped');var h=this.querySelector('.s-hint');if(h)h.style.display=this.classList.contains('flipped')?'none':'block';});c.appendChild(card);});updateStats();}
function addSentence(){var de=document.getElementById('deInput').value.trim(),ua=document.getElementById('uaInput').value.trim(),ru=document.getElementById('ruInput').value.trim();if(!de)return;_sentences.push({de:de,ua:ua||'—',ru:ru||'—'});document.getElementById('deInput').value='';document.getElementById('uaInput').value='';document.getElementById('ruInput').value='';showToast('✅ Речення додано!');renderSentences();}
function startQuiz(){var u=_words.filter(function(w){return !w.learned;});if(u.length<2){document.getElementById('quiz-area').innerHTML='<div class="quiz-card"><div class="quiz-question">🎉 Всі слова вивчені!</div></div><div class="quiz-btns"><button class="btn-show" onclick="switchTab('words')">← До слів</button></div>';return;}_quizOrder=u.map(function(w){return _words.indexOf(w);}).sort(function(){return Math.random()-0.5;});_quizIndex=0;_quizScore=0;showQuizCard();}
function showQuizCard(){var area=document.getElementById('quiz-area');if(_quizIndex>=_quizOrder.length){var pct=Math.round((_quizScore/_quizOrder.length)*100);area.innerHTML='<div class="quiz-card"><div class="quiz-question">'+_quizScore+'/'+_quizOrder.length+'</div><div class="quiz-sub">'+(pct>=80?'🔥 Відмінно!':pct>=50?'👍 Непогано!':'💪 Продовжуй!')+' '+pct+'%</div><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div></div><div class="quiz-btns"><button class="btn-show" onclick="startQuiz()">🔄 Ще раз</button><button class="btn-correct" onclick="switchTab('words')">← До слів</button></div>';if(pct>=80)confetti();return;}var w=_words[_quizOrder[_quizIndex]];var pct=Math.round((_quizIndex/_quizOrder.length)*100);area.innerHTML='<div class="quiz-progress">'+(_quizIndex+1)+' / '+_quizOrder.length+'</div><div class="quiz-score">✅ '+_quizScore+' вірних | 🔥 '+_quizStreak+' підряд</div><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div><div class="quiz-card"><div class="quiz-sub">Як перекладається?</div><div class="quiz-question">'+w.word+'</div><div class="quiz-answer" id="quiz-ans">'+getTrans(w)+'<br><em style="font-size:12px;color:#aaa;display:block;margin-top:6px">'+getEx(w)+'</em></div></div><div class="quiz-btns"><button class="btn-show" onclick="revealAnswer()">👁 Показати</button><button class="btn-correct" id="btn-ok" style="display:none" onclick="quizAnswer(true)">✅ Знав</button><button class="btn-wrong" id="btn-no" style="display:none" onclick="quizAnswer(false)">❌ Не знав</button></div>';}
function revealAnswer(){document.getElementById('quiz-ans').style.display='block';document.querySelector('.btn-show').style.display='none';document.getElementById('btn-ok').style.display='inline-block';document.getElementById('btn-no').style.display='inline-block';}
function quizAnswer(c){if(c){_quizScore++;_quizStreak++;showToast('🎉 Правильно!');if(_quizStreak%3===0)confetti();}else{_quizStreak=0;showToast('❌ Наступного разу!');}updateStats();_quizIndex++;setTimeout(showQuizCard,400);}
renderWords();renderSentences();updateStats();
</script>
</body>
</html>
