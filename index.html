<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jane-slova</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:#f0f4ff;min-height:100vh;padding:24px 20px;}
h1{text-align:center;color:#3a3a6e;margin-bottom:4px;font-size:26px;}
.subtitle{text-align:center;color:#888;margin-bottom:16px;font-size:13px;}
.stats{display:flex;justify-content:center;gap:16px;margin-bottom:16px;flex-wrap:wrap;}
.stat{background:white;border-radius:12px;padding:9px 18px;font-size:12px;color:#555;box-shadow:0 2px 8px rgba(108,99,255,0.08);text-align:center;}
.stat strong{display:block;font-size:19px;color:#6c63ff;}
.lang-bar{display:flex;justify-content:center;align-items:center;gap:10px;margin-bottom:14px;font-size:13px;color:#888;}
.lang-switch{display:flex;background:#e8e8f8;border-radius:20px;padding:3px;gap:2px;}
.lang-switch button{padding:6px 16px;border:none;border-radius:16px;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:#888;transition:all 0.2s;}
.lang-switch button.active{background:#6c63ff;color:white;box-shadow:0 2px 8px rgba(108,99,255,0.25);}
/* top-level section switcher */
.section-switcher{display:flex;justify-content:center;gap:12px;margin-bottom:20px;}
.sec-btn{padding:10px 28px;border-radius:22px;border:2px solid #6c63ff;background:white;color:#6c63ff;font-size:15px;cursor:pointer;font-weight:700;transition:all 0.2s;}
.sec-btn.active{background:#6c63ff;color:white;box-shadow:0 4px 14px rgba(108,99,255,0.3);}
.sec-btn.eng-btn{border-color:#1565c0;color:#1565c0;}
.sec-btn.eng-btn.active{background:#1565c0;color:white;box-shadow:0 4px 14px rgba(21,101,192,0.3);}
/* inner tabs (DE) */
.tabs{display:flex;justify-content:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.tab-btn{padding:9px 20px;border-radius:20px;border:2px solid #6c63ff;background:white;color:#6c63ff;font-size:14px;cursor:pointer;font-weight:600;transition:all 0.2s;}
.tab-btn.active{background:#6c63ff;color:white;}
.tab-btn.repeat-tab{border-color:#ff9800;color:#ff9800;}
.tab-btn.repeat-tab.active{background:#ff9800;color:white;box-shadow:0 0 14px rgba(255,152,0,0.45);}
.tab-btn.repeat-tab .repeat-count{background:#ff9800;color:white;border-radius:10px;padding:1px 7px;font-size:11px;margin-left:4px;display:inline-block;}
.tab-btn.repeat-tab.active .repeat-count{background:white;color:#ff9800;}
/* english inner tabs */
.en-tabs{display:flex;justify-content:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.en-tab-btn{padding:9px 20px;border-radius:20px;border:2px solid #1565c0;background:white;color:#1565c0;font-size:14px;cursor:pointer;font-weight:600;transition:all 0.2s;}
.en-tab-btn.active{background:#1565c0;color:white;}
.en-tab-btn.en-repeat-tab{border-color:#ff9800;color:#ff9800;}
.en-tab-btn.en-repeat-tab.active{background:#ff9800;color:white;}
.en-tab-btn.en-repeat-tab .en-repeat-count{background:#ff9800;color:white;border-radius:10px;padding:1px 7px;font-size:11px;margin-left:4px;display:inline-block;}
.en-tab-btn.en-repeat-tab.active .en-repeat-count{background:white;color:#ff9800;}
/* add form */
.add-form{display:flex;gap:10px;max-width:960px;margin:0 auto 20px;flex-wrap:wrap;}
.add-form input{flex:1;padding:11px 14px;border:2px solid #c5cee0;border-radius:12px;font-size:14px;outline:none;transition:border 0.2s;min-width:110px;font-family:inherit;}
.add-form input:focus{border-color:#6c63ff;}
.add-form button{padding:11px 20px;background:#6c63ff;color:white;border:none;border-radius:12px;font-size:14px;cursor:pointer;transition:background 0.2s;white-space:nowrap;}
.add-form button:hover{background:#574fd6;}
.add-form.en-form input:focus{border-color:#1565c0;}
.add-form.en-form button{background:#1565c0;}
.add-form.en-form button:hover{background:#0d47a1;}
.search-bar{max-width:750px;margin:0 auto 18px;}
.search-bar input{width:100%;padding:10px 16px;border:2px solid #c5cee0;border-radius:12px;font-size:14px;outline:none;font-family:inherit;transition:border 0.2s;}
.search-bar input:focus{border-color:#6c63ff;}
/* cards */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:16px;max-width:900px;margin:0 auto;}
.card{background:white;border-radius:16px;padding:20px 18px;box-shadow:0 4px 15px rgba(108,99,255,0.08);cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;position:relative;min-height:115px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;user-select:none;}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(108,99,255,0.16);}
.card.learned{border:2px solid #4caf50;background:#f8fff8;}
.card.repeat{border:2px solid #ff9800;background:#fffaf0;animation:glow-repeat 2s ease-in-out infinite alternate;}
.card.en-card{box-shadow:0 4px 15px rgba(21,101,192,0.1);}
.card.en-card:hover{box-shadow:0 8px 22px rgba(21,101,192,0.2);}
.card.en-card.repeat{border:2px solid #ff9800;animation:glow-repeat 2s ease-in-out infinite alternate;}
@keyframes glow-repeat{0%{box-shadow:0 4px 18px rgba(255,152,0,0.22);}100%{box-shadow:0 4px 28px rgba(255,152,0,0.5),0 0 0 3px rgba(255,152,0,0.2);}}
.card .word{font-size:20px;font-weight:700;color:#3a3a6e;margin-bottom:6px;}
.card.en-card .word{color:#1565c0;}
.card .translation{font-size:14px;color:#6c63ff;display:none;margin-top:2px;}
.card.en-card .translation{color:#1565c0;}
.card.flipped .translation{display:block;}
.card.flipped .word{color:#aaa;font-size:13px;}
.card .hint{font-size:10px;color:#ccc;margin-top:6px;}
.card .example{font-size:12px;color:#999;margin-top:8px;display:none;text-align:left;padding:6px 10px;background:#f7f7ff;border-radius:8px;border-left:3px solid #6c63ff;width:100%;line-height:1.5;}
.card.en-card .example{background:#f0f4ff;border-left-color:#1565c0;}
.card.flipped .example{display:block;}
.card .ex-src{font-size:12px;color:#3a3a6e;font-weight:600;display:block;margin-bottom:3px;font-style:normal;}
.card .ex-label{font-size:10px;font-weight:700;color:#6c63ff;text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:2px;font-style:normal;}
.card.en-card .ex-label{color:#1565c0;}
.card .ex-trans{font-size:12px;color:#888;font-style:italic;display:block;}
.card .learned-badge{font-size:10px;color:#4caf50;font-weight:700;margin-top:5px;}
.card .repeat-badge{font-size:10px;color:#ff9800;font-weight:700;margin-top:5px;}
.card-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;justify-content:center;}
.card-actions button{font-size:12px;padding:4px 10px;border-radius:8px;border:none;cursor:pointer;transition:all 0.2s;}
.btn-learn{background:#e8f5e9;color:#4caf50;}
.btn-learn:hover,.btn-learn.done{background:#4caf50;color:white;}
.btn-repeat{background:#fff3e0;color:#ff9800;}
.btn-repeat:hover,.btn-repeat.on{background:#ff9800;color:white;}
/* repeat header */
.repeat-section-header{max-width:900px;margin:0 auto 16px;padding:14px 20px;background:linear-gradient(135deg,#ff9800,#ffb74d);border-radius:14px;color:white;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.repeat-mode-btns{display:flex;gap:8px;}
.repeat-mode-btn{padding:7px 18px;border-radius:12px;border:2px solid white;background:transparent;color:white;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;}
.repeat-mode-btn.active{background:white;color:#ff9800;}
/* flashcard */
.flashcard-wrap{max-width:560px;margin:0 auto;text-align:center;}
.flashcard-progress-bar{background:rgba(255,152,0,0.15);border-radius:10px;height:7px;margin-bottom:18px;overflow:hidden;}
.flashcard-progress-fill{background:#ff9800;height:100%;border-radius:10px;transition:width 0.4s;}
.flashcard-counter{font-size:13px;color:#ff9800;font-weight:700;margin-bottom:14px;}
.flashcard{background:white;border-radius:24px;padding:44px 36px;box-shadow:0 8px 32px rgba(255,152,0,0.18);min-height:220px;display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:pointer;transition:transform 0.15s;position:relative;border:2px solid #ffe0b2;user-select:none;}
.flashcard:hover{transform:translateY(-3px);}
.flashcard.en-flash{border-color:#bbdefb;box-shadow:0 8px 32px rgba(21,101,192,0.15);}
.flashcard .fc-word{font-size:34px;font-weight:800;color:#3a3a6e;margin-bottom:8px;}
.flashcard.en-flash .fc-word{color:#1565c0;}
.flashcard .fc-hint{font-size:12px;color:#ccc;margin-top:10px;}
.flashcard .fc-trans{display:none;font-size:22px;color:#ff9800;font-weight:700;margin-top:8px;}
.flashcard.en-flash .fc-trans{color:#1565c0;}
.flashcard .fc-example{display:none;margin-top:14px;padding:10px 14px;background:#fff8f0;border-radius:10px;border-left:3px solid #ff9800;text-align:left;width:100%;}
.flashcard.en-flash .fc-example{background:#e3f2fd;border-left-color:#1565c0;}
.flashcard .fc-ex-src{font-size:13px;color:#3a3a6e;font-weight:600;display:block;margin-bottom:4px;}
.flashcard .fc-ex-label{font-size:10px;font-weight:700;color:#ff9800;text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:2px;}
.flashcard.en-flash .fc-ex-label{color:#1565c0;}
.flashcard .fc-ex-trans{font-size:12px;color:#aaa;font-style:italic;display:block;}
.flashcard.revealed .fc-trans,.flashcard.revealed .fc-example{display:block;}
.flashcard.revealed .fc-hint{display:none;}
.flashcard-btns{display:flex;gap:14px;justify-content:center;margin-top:22px;flex-wrap:wrap;}
.flashcard-btns button{padding:12px 30px;border-radius:14px;border:none;font-size:15px;cursor:pointer;font-weight:700;transition:all 0.2s;}
.fc-btn-show{background:#ff9800;color:white;}
.fc-btn-show:hover{background:#e65100;}
.flashcard.en-flash~div .fc-btn-show,.en-flash-mode .fc-btn-show{background:#1565c0;}
.fc-btn-know{background:#e8f5e9;color:#4caf50;font-size:13px;padding:10px 22px;}
.fc-btn-know:hover{background:#4caf50;color:white;}
.fc-btn-again{background:#ffeaea;color:#e53935;font-size:13px;padding:10px 22px;}
.fc-btn-again:hover{background:#e53935;color:white;}
.fc-result{background:white;border-radius:20px;padding:36px 28px;box-shadow:0 6px 25px rgba(255,152,0,0.15);text-align:center;}
.fc-result h2{font-size:28px;color:#3a3a6e;margin-bottom:8px;}
.fc-result .fc-score{font-size:48px;font-weight:800;color:#ff9800;display:block;margin-bottom:4px;}
.fc-result p{font-size:15px;color:#888;margin-bottom:20px;}
/* english EN flashcard blue accent */
.en-fc-wrap .fc-btn-show{background:#1565c0;}
.en-fc-wrap .fc-btn-show:hover{background:#0d47a1;}
.en-fc-wrap .flashcard-progress-fill{background:#1565c0;}
.en-fc-wrap .flashcard-counter{color:#1565c0;}
.en-fc-wrap .fc-result .fc-score{color:#1565c0;}
/* sentences */
.sentences-wrap{max-width:820px;margin:0 auto;}
.group-title{background:linear-gradient(135deg,#6c63ff,#a78bfa);color:white;border-radius:14px;padding:12px 20px;margin-bottom:16px;font-size:13px;font-weight:700;line-height:1.5;}
.sent-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:18px;}
.sent-nav button{width:44px;height:44px;border-radius:50%;border:2px solid #6c63ff;background:white;color:#6c63ff;font-size:20px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;}
.sent-nav button:hover{background:#6c63ff;color:white;}
.sent-nav button:disabled{opacity:0.3;cursor:default;}
.sent-counter{font-size:14px;font-weight:700;color:#6c63ff;}
.sentence-card{background:white;border-radius:16px;padding:24px 26px;box-shadow:0 4px 15px rgba(108,99,255,0.08);cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;min-height:130px;}
.sentence-card:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(108,99,255,0.16);}
.sentence-card .num{font-size:11px;font-weight:700;color:#6c63ff;letter-spacing:1px;margin-bottom:8px;text-transform:uppercase;}
.sentence-card .de{font-size:16px;font-weight:600;color:#3a3a6e;line-height:1.6;}
.sentence-card .trans{font-size:14px;color:#6c63ff;line-height:1.6;margin-top:12px;padding-top:12px;border-top:1px dashed #e0e0f0;display:none;}
.sentence-card.flipped .trans{display:block;}
.s-hint{font-size:11px;color:#bbb;margin-top:8px;}
.sentence-card.flipped .s-hint{display:none;}
/* quiz */
.quiz-area{max-width:600px;margin:0 auto;text-align:center;}
.quiz-card{background:white;border-radius:20px;padding:38px 30px;box-shadow:0 6px 25px rgba(108,99,255,0.12);margin-bottom:22px;min-height:175px;display:flex;flex-direction:column;justify-content:center;align-items:center;}
.quiz-question{font-size:26px;font-weight:700;color:#3a3a6e;margin-bottom:6px;}
.quiz-sub{font-size:13px;color:#aaa;margin-bottom:16px;}
.quiz-answer{display:none;font-size:17px;color:#6c63ff;margin-top:14px;padding:12px;background:#f0eeff;border-radius:12px;width:100%;}
.quiz-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.quiz-btns button{padding:11px 26px;border-radius:12px;border:none;font-size:14px;cursor:pointer;font-weight:600;transition:all 0.2s;}
.btn-show{background:#6c63ff;color:white;}
.btn-show:hover{background:#574fd6;}
.btn-correct{background:#e8f5e9;color:#4caf50;}
.btn-correct:hover{background:#4caf50;color:white;}
.btn-wrong{background:#ffeaea;color:#e53935;}
.btn-wrong:hover{background:#e53935;color:white;}
.quiz-progress{font-size:13px;color:#aaa;margin-bottom:12px;}
.quiz-score{font-size:14px;font-weight:600;color:#3a3a6e;margin-bottom:12px;}
.progress-bar{background:#e0e0f0;border-radius:10px;height:7px;margin-bottom:18px;overflow:hidden;}
.progress-fill{background:#6c63ff;height:100%;border-radius:10px;transition:width 0.4s;}
.delete-btn{position:absolute;top:9px;right:11px;background:none;border:none;color:#ddd;font-size:16px;cursor:pointer;transition:color 0.2s;line-height:1;}
.delete-btn:hover{color:#ff6b6b;}
.section{display:none;}
.section.active{display:block;}
.empty{text-align:center;color:#bbb;padding:40px;font-size:15px;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);background:#3a3a6e;color:white;padding:11px 22px;border-radius:14px;font-size:14px;font-weight:600;opacity:0;transition:all 0.3s;pointer-events:none;z-index:9999;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.confetti-piece{position:fixed;width:10px;height:10px;border-radius:2px;animation:fall 1.5s ease-in forwards;pointer-events:none;z-index:9999;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}
/* EN section accent */
.en-section-wrap .stat strong{color:#1565c0;}
</style>
</head>
<body>
<h1>jane-slova</h1>
<p class="subtitle">Натисни на карточку, щоб побачити переклад</p>
<div class="stats">
  <div class="stat"><strong id="stat-total">0</strong>DE слів</div>
  <div class="stat"><strong id="stat-learned">0</strong>вивчено</div>
  <div class="stat"><strong id="stat-repeat">0</strong>повторити</div>
  <div class="stat"><strong id="stat-en-total">0</strong>EN слів</div>
  <div class="stat"><strong id="stat-sentences">0</strong>речень</div>
  <div class="stat"><strong id="stat-streak">0🔥</strong>підряд</div>
</div>
<div class="lang-bar"><span>Мова перекладу (DE):</span><div class="lang-switch">
  <button id="lang-ua" class="active" onclick="setLang('ua')">🇺🇦 UA</button>
  <button id="lang-ru" onclick="setLang('ru')">🇷🇺 RU</button>
  <button id="lang-en" onclick="setLang('en')">🇬🇧 EN</button>
</div></div>

<div class="section-switcher">
  <button class="sec-btn active" id="sec-de" onclick="switchSection('de')">🇩🇪 Deutsch</button>
  <button class="sec-btn eng-btn" id="sec-en" onclick="switchSection('en')">🇬🇧 English</button>
</div>

<!-- ============ DE SECTION ============ -->
<div id="de-section" class="section active">
  <div class="tabs">
    <button class="tab-btn active" id="tab-words" onclick="switchTab('words')">🔤 Слова</button>
    <button class="tab-btn repeat-tab" id="tab-repeat" onclick="switchTab('repeat')">🔁 Повторити <span class="repeat-count" id="repeat-count">0</span></button>
    <button class="tab-btn" id="tab-sentences" onclick="switchTab('sentences')">📝 Речення</button>
    <button class="tab-btn" id="tab-quiz" onclick="switchTab('quiz')">🎯 Квіз</button>
  </div>
  <div class="section active" id="words-section">
    <div class="search-bar"><input type="text" id="searchInput" placeholder="🔍 Пошук слів..." oninput="renderWords()"/></div>
    <div class="add-form">
      <input type="text" id="wordInput" placeholder="Слово (DE)"/>
      <input type="text" id="transUaInput" placeholder="Переклад UA"/>
      <input type="text" id="transRuInput" placeholder="Перевод RU"/>
      <input type="text" id="transEnInput" placeholder="Translation EN"/>
      <button onclick="addWord()">+ Додати</button>
    </div>
    <div class="cards" id="cards"></div>
  </div>
  <div class="section" id="repeat-section"><div id="repeat-inner"></div></div>
  <div class="section" id="sentences-section"><div class="sentences-wrap" id="sentences-wrap"></div></div>
  <div class="section" id="quiz-section"><div class="quiz-area" id="quiz-area"></div></div>
</div>

<!-- ============ EN SECTION ============ -->
<div id="en-section" class="section">
  <div class="en-tabs">
    <button class="en-tab-btn active" id="en-tab-words" onclick="switchEnTab('words')">🔤 Words</button>
    <button class="en-tab-btn en-repeat-tab" id="en-tab-repeat" onclick="switchEnTab('repeat')">🔁 Repeat <span class="en-repeat-count" id="en-repeat-count">0</span></button>
    <button class="en-tab-btn" id="en-tab-quiz" onclick="switchEnTab('quiz')">🎯 Quiz</button>
    <button class="en-tab-btn" id="en-tab-sent" onclick="switchEnTab('sent')">📖 Sentences</button>
  </div>
  <div class="section active" id="en-words-section">
    <div class="search-bar"><input type="text" id="enSearchInput" placeholder="🔍 Search words..." oninput="renderEnWords()"/></div>
    <div class="add-form en-form">
      <input type="text" id="enWordInput" placeholder="Word (EN)"/>
      <input type="text" id="enTransUaInput" placeholder="Переклад UA"/>
      <input type="text" id="enTransRuInput" placeholder="Перевод RU"/>
      <input type="text" id="enTransDeInput" placeholder="Übersetzung DE"/>
      <button onclick="addEnWord()">+ Add</button>
    </div>
    <div class="cards" id="en-cards"></div>
  </div>
  <div class="section" id="en-repeat-section"><div id="en-repeat-inner"></div></div>
  <div class="section" id="en-quiz-section"><div class="quiz-area" id="en-quiz-area"></div></div>
  <div class="section" id="en-sent-section"><div class="sentences-wrap" id="en-sent-wrap"></div></div>
</div>

<div class="toast" id="toast"></div>
<script>
/* ======= STATE ======= */
var _lang="ua",_quizStreak=0,_quizScore=0,_quizIndex=0,_quizOrder=[];
var _repeatMode="cards";
var _fcList=[],_fcIndex=0,_fcScore=0,_fcAgainList=[];
var _enRepeatMode="cards";
var _enFcList=[],_enFcIndex=0,_enFcScore=0,_enFcAgainList=[];
var _enQuizStreak=0,_enQuizScore=0,_enQuizIndex=0,_enQuizOrder=[];
var _curSection="de", _curEnTab="words";

/* ======= DE WORDS ======= */
var _words=[
{"word":"sichtlich","ua":"очевидно, явно","ru":"очевидно, явно","en":"obviously, visibly","learned":false,"repeat":false,"exDe":"Er war sichtlich erschöpft nach der langen Reise.","exUa":"Він був явно виснажений після довгої подорожі.","exRu":"Он был явно измотан после долгой поездки.","exEn":"He was visibly exhausted after the long journey."},
{"word":"derart","ua":"настільки, таким чином","ru":"настолько, таким образом","en":"so much, in such a way","learned":false,"repeat":false,"exDe":"Das Wasser war derart kalt, dass ich sofort aufgehört habe zu schwimmen.","exUa":"Вода була настільки холодною, що я одразу перестав плавати.","exRu":"Вода была настолько холодной, что я сразу перестал плавать.","exEn":"The water was so cold that I immediately stopped swimming."},

/* ======= HELPERS ======= */
function getTrans(w){return _lang==="ru"?w.ru:(_lang==="en"?w.en:w.ua);}
function getEx(w){return _lang==="ru"?w.exRu:(_lang==="en"?w.exEn:w.exUa);}
function getExLabel(){return _lang==="ru"?"Пример:":(_lang==="en"?"Example:":"Приклад:");}
function getSentTrans(s){return _lang==="ru"?s.ru:(_lang==="en"?s.en:s.ua);}
function showToast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2200);}
function confetti(){var c=["#6c63ff","#ff6584","#ffbe0b","#4caf50","#1565c0"];for(var i=0;i<28;i++){var el=document.createElement("div");el.className="confetti-piece";el.style.cssText="left:"+(Math.random()*100)+"vw;top:-10px;background:"+c[Math.floor(Math.random()*5)]+";animation-delay:"+(Math.random()*0.6)+"s;width:"+(6+Math.random()*8)+"px;height:"+(6+Math.random()*8)+"px;";document.body.appendChild(el);setTimeout(function(){el.remove();},2000);}}

function updateStats(){
  var total=0;_groups.forEach(function(g){total+=g.sentences.length;});
  var rep=_words.filter(function(w){return w.repeat;}).length;
  document.getElementById("stat-total").textContent=_words.length;
  document.getElementById("stat-learned").textContent=_words.filter(function(w){return w.learned;}).length;
  document.getElementById("stat-repeat").textContent=rep;
  document.getElementById("stat-en-total").textContent=_enWords.length;
  document.getElementById("stat-sentences").textContent=total;
  document.getElementById("stat-streak").textContent=_quizStreak+"🔥";
  document.getElementById("repeat-count").textContent=rep;
  document.getElementById("en-repeat-count").textContent=_enWords.filter(function(w){return w.repeat;}).length;
}

/* ======= SECTION SWITCHER ======= */
function switchSection(sec){
  _curSection=sec;
  document.getElementById("sec-de").classList.toggle("active",sec==="de");
  document.getElementById("sec-en").classList.toggle("active",sec==="en");
  document.getElementById("de-section").classList.toggle("active",sec==="de");
  document.getElementById("en-section").classList.toggle("active",sec==="en");
  if(sec==="en") renderEnWords();
}

function setLang(l){
  _lang=l;
  ["ua","ru","en"].forEach(function(x){document.getElementById("lang-"+x).classList.toggle("active",x===l);});
  renderWords();renderRepeat();renderSentences();
}

/* ======= DE TABS ======= */
function switchTab(tab){
  ["words","repeat","sentences","quiz"].forEach(function(t){
    document.getElementById("tab-"+t).classList.toggle("active",t===tab);
    document.getElementById(t+"-section").classList.toggle("active",t===tab);
  });
  if(tab==="quiz")startQuiz();
  if(tab==="repeat")renderRepeat();
}

/* ======= DE CARD BUILDER ======= */
function buildCard(item,i,isEn){
  var card=document.createElement("div");
  card.className="card"+(isEn?" en-card":"")+(item.learned?" learned":"")+(item.repeat?" repeat":"");
  var delBtn=document.createElement("button");delBtn.className="delete-btn";delBtn.textContent="✕";
  delBtn.addEventListener("click",function(e){e.stopPropagation();if(isEn){_enWords.splice(i,1);renderEnWords();renderEnRepeat();}else{_words.splice(i,1);renderWords();renderRepeat();}});
  var wordDiv=document.createElement("div");wordDiv.className="word";wordDiv.textContent=item.word;
  if(isEn){var speakBtn=document.createElement("button");speakBtn.innerHTML="🔊";speakBtn.title="Listen";speakBtn.style.cssText="background:none;border:none;font-size:18px;cursor:pointer;margin-left:8px;vertical-align:middle;padding:2px;line-height:1;";speakBtn.onclick=function(e){e.stopPropagation();speakEn(item.word);};wordDiv.appendChild(speakBtn);}
  var transDiv=document.createElement("div");transDiv.className="translation";
  transDiv.textContent=isEn?getEnTrans(item):getTrans(item);
  var exDiv=document.createElement("div");exDiv.className="example";
  var srcSpan=document.createElement("span");srcSpan.className="ex-src";
  srcSpan.textContent=isEn?(item.exEn||""):(item.exDe||"");
  var exLabel=document.createElement("span");exLabel.className="ex-label";
  exLabel.textContent=isEn?getEnExLabel():getExLabel();
  var exTrans=document.createElement("span");exTrans.className="ex-trans";
  exTrans.textContent=isEn?getEnEx(item):(getEx(item)||"");
  if(srcSpan.textContent)exDiv.appendChild(srcSpan);
  exDiv.appendChild(exLabel);exDiv.appendChild(exTrans);
  var actDiv=document.createElement("div");actDiv.className="card-actions";
  var learnBtn=document.createElement("button");learnBtn.className="btn-learn"+(item.learned?" done":"");
  learnBtn.textContent=item.learned?"✅ Вивчено":"📌 Вивчив";
  learnBtn.addEventListener("click",function(e){e.stopPropagation();item.learned=!item.learned;if(item.learned){confetti();showToast("🎉 Відмічено як вивчене!");}if(isEn){renderEnWords();renderEnRepeat();}else{renderWords();renderRepeat();}});
  var repBtn=document.createElement("button");repBtn.className="btn-repeat"+(item.repeat?" on":"");
  repBtn.textContent=item.repeat?"🔁 В списку":"🔁 Повторити";
  repBtn.addEventListener("click",function(e){e.stopPropagation();item.repeat=!item.repeat;showToast(item.repeat?"🔁 Додано до повторення!":"Прибрано з повторення");if(isEn){renderEnWords();renderEnRepeat();}else{renderWords();renderRepeat();}});
  actDiv.appendChild(learnBtn);actDiv.appendChild(repBtn);
  card.appendChild(delBtn);card.appendChild(wordDiv);card.appendChild(transDiv);card.appendChild(exDiv);
  if(item.repeat&&!item.learned){var rb=document.createElement("div");rb.className="repeat-badge";rb.textContent="🔁 До повторення";card.appendChild(rb);}
  else if(item.learned){var b=document.createElement("div");b.className="learned-badge";b.textContent="✅ Вивчено";card.appendChild(b);}
  else{var h=document.createElement("div");h.className="hint";h.textContent="👆 натисни";card.appendChild(h);}
  card.appendChild(actDiv);
  card.addEventListener("click",function(){this.classList.toggle("flipped");var h=this.querySelector(".hint");if(h)h.style.display=this.classList.contains("flipped")?"none":"block";});
  return card;
}

function renderWords(){
  var q=(document.getElementById("searchInput").value||"").toLowerCase();
  var c=document.getElementById("cards");c.innerHTML="";
  var f=_words.filter(function(w){return !q||w.word.toLowerCase().includes(q)||getTrans(w).toLowerCase().includes(q);});
  if(!f.length){c.innerHTML='<div class="empty">Нічого не знайдено 🤷</div>';return;}
  f.forEach(function(item){c.appendChild(buildCard(item,_words.indexOf(item),false));});
  updateStats();
}

function addWord(){
  var w=document.getElementById("wordInput").value.trim(),ua=document.getElementById("transUaInput").value.trim(),ru=document.getElementById("transRuInput").value.trim(),en=document.getElementById("transEnInput").value.trim();
  if(!w)return;
  _words.push({word:w,ua:ua||"—",ru:ru||"—",en:en||"—",learned:false,repeat:false,exDe:"",exUa:"",exRu:"",exEn:""});
  ["wordInput","transUaInput","transRuInput","transEnInput"].forEach(function(id){document.getElementById(id).value="";});
  showToast("✅ Слово додано!");renderWords();
}

/* ======= DE REPEAT ======= */
function renderRepeat(){
  var inner=document.getElementById("repeat-inner");inner.innerHTML="";
  var rep=_words.filter(function(w){return w.repeat;});
  if(!rep.length){inner.innerHTML='<div class="empty">Натисни 🔁 на карточці, щоб додати сюди слово.</div>';updateStats();return;}
  var hdr=document.createElement("div");hdr.className="repeat-section-header";
  var title=document.createElement("span");title.innerHTML="🔁 Слова для повторення: <strong>"+rep.length+"</strong>";
  var mbtns=document.createElement("div");mbtns.className="repeat-mode-btns";
  var mC=document.createElement("button");mC.className="repeat-mode-btn"+(_repeatMode==="cards"?" active":"");mC.textContent="🃏 Карточки";
  var mF=document.createElement("button");mF.className="repeat-mode-btn"+(_repeatMode==="flash"?" active":"");mF.textContent="⚡ По одній";
  mC.addEventListener("click",function(){_repeatMode="cards";renderRepeat();});
  mF.addEventListener("click",function(){_repeatMode="flash";renderRepeat();});
  mbtns.appendChild(mC);mbtns.appendChild(mF);
  hdr.appendChild(title);hdr.appendChild(mbtns);inner.appendChild(hdr);
  if(_repeatMode==="cards"){var grid=document.createElement("div");grid.className="cards";rep.forEach(function(item){grid.appendChild(buildCard(item,_words.indexOf(item),false));});inner.appendChild(grid);}
  else startFlashcards(rep,inner,false);
  updateStats();
}

/* ======= DE SENTENCES ======= */
function renderSentences(){
  var wrap=document.getElementById("sentences-wrap");wrap.innerHTML="";
  _groups.forEach(function(group){
    var sec=document.createElement("div");sec.style.marginBottom="28px";
    var title=document.createElement("div");title.className="group-title";title.textContent=group.title;sec.appendChild(title);
    var nav=document.createElement("div");nav.className="sent-nav";
    var bP=document.createElement("button");bP.textContent="←";
    var cnt=document.createElement("span");cnt.className="sent-counter";
    var bN=document.createElement("button");bN.textContent="→";
    nav.appendChild(bP);nav.appendChild(cnt);nav.appendChild(bN);sec.appendChild(nav);
    var ca=document.createElement("div");sec.appendChild(ca);wrap.appendChild(sec);
    var idx=0;

  var html="";
  _enGroups.forEach(function(g,gi){
    var cur=g._cur||0;
    var total=g.sentences.length;
    var s=g.sentences[cur];
    var trans=lang==="ru"?s.ru:(lang==="de"?s.de:s.ua);
    var tapLabel=lang==="ru"?"нажми, чтобы увидеть перевод":(lang==="de"?"tippen für Übersetzung":"натисни, щоб побачити переклад");

function enSentToggle(gi){

function speakEn(word){
  var url="https://translate.googleapis.com/translate_tts?ie=UTF-8&q="+encodeURIComponent(word)+"&tl=en-US&client=tw-ob";
  var a=new Audio(url);
  a.volume=1.0;
  a.play().catch(function(){
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(word);
    u.lang="en-US";u.rate=0.85;u.volume=1.0;
    var vs=window.speechSynthesis.getVoices();
    var v=null;
    for(var i=0;i<vs.length;i++){if(vs[i].lang.indexOf("en")===0){v=vs[i];break;}}
    if(v)u.voice=v;
    window.speechSynthesis.speak(u);
  });
}
