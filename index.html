{"de":"Ehe die Arglosigkeit beschleunigt wurde, handelte er künftig gedankenlos und vergass die Konsequenzen.","ua":"Перш ніж бездумність пришвидшилася, він діяв надалі бездумно і забув про наслідки.","ru":"Прежде чем наивность ускорилась, он в будущем действовал бездумно и забыл о последствиях."}

];function getTrans(w){return _lang==='ru'?w.ru:w.ua;}
function getEx(w){return _lang==='ru'?w.exRu:w.exUa;}
function getExLabel(){return _lang==='ru'?'Пример:':'Приклад:';}
function getSentTrans(s){return _lang==='ru'?s.ru:s.ua;}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}
function confetti(){var c=['#6c63ff','#ff6584','#ffbe0b','#4caf50','#00bcd4'];for(var i=0;i<28;i++){var el=document.createElement('div');el.className='confetti-piece';el.style.cssText='left:'+(Math.random()*100)+'vw;top:-10px;background:'+c[Math.floor(Math.random()*5)]+';animation-delay:'+(Math.random()*0.6)+'s;width:'+(6+Math.random()*8)+'px;height:'+(6+Math.random()*8)+'px;';document.body.appendChild(el);setTimeout(function(){el.remove();},2000);}}
function updateStats(){var total=0;_groups.forEach(function(g){total+=g.sentences.length;});document.getElementById('stat-total').textContent=_words.length;document.getElementById('stat-learned').textContent=_words.filter(function(w){return w.learned;}).length;document.getElementById('stat-sentences').textContent=total;document.getElementById('stat-streak').textContent=_quizStreak+'🔥';}
function setLang(l){_lang=l;document.getElementById('lang-ua').classList.toggle('active',l==='ua');document.getElementById('lang-ru').classList.toggle('active',l==='ru');renderWords();renderSentences();var qs=document.getElementById('quiz-section');if(qs&&qs.classList.contains('active'))startQuiz();}
function switchTab(tab){['words','sentences','quiz'].forEach(function(t){document.getElementById('tab-'+t).classList.toggle('active',t===tab);document.getElementById(t+'-section').classList.toggle('active',t===tab);});if(tab==='quiz')startQuiz();}
function renderWords(){var q=(document.getElementById('searchInput').value||'').toLowerCase();var c=document.getElementById('cards');c.innerHTML='';var f=_words.filter(function(w){return !q||w.word.toLowerCase().includes(q)||getTrans(w).toLowerCase().includes(q);});if(!f.length){c.innerHTML='<div class="empty">Нічого не знайдено 🤷</div>';return;}f.forEach(function(item){var i=_words.indexOf(item);var card=document.createElement('div');card.className='card'+(item.learned?' learned':'');card.innerHTML='<button class="delete-btn" data-i="'+i+'">✕</button><div class="word">'+item.word+'</div><div class="translation">'+getTrans(item)+'</div><div class="example"><span class="ex-label">'+getExLabel()+'</span>'+getEx(item)+'</div>'+(item.learned?'<div class="learned-badge">✅ Вивчено</div>':'<div class="hint">👆 натисни</div>')+'<div class="card-actions"><button class="btn-learn'+(item.learned?' done':'')+ '" data-li="'+i+'">' +(item.learned?'✅ Вивчено':'📌 Вивчив')+'</button></div>';card.querySelector('.delete-btn').addEventListener('click',function(e){e.stopPropagation();_words.splice(parseInt(this.dataset.i),1);renderWords();});card.querySelector('.btn-learn').addEventListener('click',function(e){e.stopPropagation();var idx=parseInt(this.dataset.li);_words[idx].learned=!_words[idx].learned;if(_words[idx].learned){confetti();showToast('🎉 Відмічено як вивчене!');}renderWords();});card.addEventListener('click',function(){this.classList.toggle('flipped');var h=this.querySelector('.hint');if(h)h.style.display=this.classList.contains('flipped')?'none':'block';});c.appendChild(card);});updateStats();}
function addWord(){var w=document.getElementById('wordInput').value.trim(),ua=document.getElementById('transUaInput').value.trim(),ru=document.getElementById('transRuInput').value.trim();if(!w)return;_words.push({word:w,ua:ua||'—',ru:ru||'—',learned:false,exDe:'',exUa:'',exRu:''});document.getElementById('wordInput').value='';document.getElementById('transUaInput').value='';document.getElementById('transRuInput').value='';showToast('✅ Слово додано!');renderWords();}
function renderSentences(){var wrap=document.getElementById('sentences-wrap');wrap.innerHTML='';_groups.forEach(function(group){var sec=document.createElement('div');sec.style.marginBottom='28px';var title=document.createElement('div');title.className='group-title';title.textContent=group.title;sec.appendChild(title);var nav=document.createElement('div');nav.className='sent-nav';var btnPrev=document.createElement('button');btnPrev.textContent='←';var counter=document.createElement('span');counter.className='sent-counter';var btnNext=document.createElement('button');btnNext.textContent='→';nav.appendChild(btnPrev);nav.appendChild(counter);nav.appendChild(btnNext);sec.appendChild(nav);var cardArea=document.createElement('div');sec.appendChild(cardArea);wrap.appendChild(sec);var idx=0;function showCard(){var s=group.sentences[idx];counter.textContent=(idx+1)+' / '+group.sentences.length;btnPrev.disabled=(idx===0);btnNext.disabled=(idx===group.sentences.length-1);cardArea.innerHTML='';var card=document.createElement('div');card.className='sentence-card';card.innerHTML='<div class="num">№ '+(idx+1)+'</div><div class="de">'+s.de+'</div><div class="trans">'+getSentTrans(s)+'</div><div class="s-hint">👆 натисни, щоб побачити переклад</div>';card.addEventListener('click',function(){this.classList.toggle('flipped');});cardArea.appendChild(card);}btnPrev.addEventListener('click',function(){if(idx>0){idx--;showCard();}});btnNext.addEventListener('click',function(){if(idx<group.sentences.length-1){idx++;showCard();}});showCard();});updateStats();}
function startQuiz(){var u=_words.filter(function(w){return !w.learned;});if(u.length<2){document.getElementById('quiz-area').innerHTML='<div class="quiz-card"><div class="quiz-question">🎉 Всі слова вивчені!</div></div><div class="quiz-btns"><button class="btn-show" onclick="switchTab(\x27words\x27)">&larr; До слів</button></div>';return;}_quizOrder=u.map(function(w){return _words.indexOf(w);}).sort(function(){return Math.random()-0.5;});_quizIndex=0;_quizScore=0;showQuizCard();}
function showQuizCard(){var area=document.getElementById('quiz-area');if(_quizIndex>=_quizOrder.length){var pct=Math.round((_quizScore/_quizOrder.length)*100);area.innerHTML='<div class="quiz-card"><div class="quiz-question">'+_quizScore+'/'+_quizOrder.length+'</div><div class="quiz-sub">'+(pct>=80?'🔥 Відмінно!':pct>=50?'👍 Непогано!':'💪 Продовжуй!')+' '+pct+'%</div><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div></div><div class="quiz-btns"><button class="btn-show" onclick="startQuiz()">🔄 Ще раз</button><button class="btn-correct" onclick="switchTab(\x27words\x27)">&larr; До слів</button></div>';if(pct>=80)confetti();return;}var w=_words[_quizOrder[_quizIndex]];var pct=Math.round((_quizIndex/_quizOrder.length)*100);area.innerHTML='<div class="quiz-progress">'+ (_quizIndex+1)+' / '+_quizOrder.length+'</div><div class="quiz-score">✅ '+_quizScore+' вірних | 🔥 '+_quizStreak+' підряд</div><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div><div class="quiz-card"><div class="quiz-sub">Як перекладається?</div><div class="quiz-question">'+w.word+'</div><div class="quiz-answer" id="quiz-ans">'+getTrans(w)+'<br><em style="font-size:12px;color:#aaa;display:block;margin-top:6px">'+getEx(w)+'</em></div></div><div class="quiz-btns"><button class="btn-show" onclick="revealAnswer()">👁 Показати</button><button class="btn-correct" id="btn-ok" style="display:none" onclick="quizAnswer(true)">✅ Знав</button><button class="btn-wrong" id="btn-no" style="display:none" onclick="quizAnswer(false)">❌ Не знав</button></div>';}
function revealAnswer(){document.getElementById('quiz-ans').style.display='block';document.querySelector('.btn-show').style.display='none';document.getElementById('btn-ok').style.display='inline-block';document.getElementById('btn-no').style.display='inline-block';}
function quizAnswer(c){if(c){_quizScore++;_quizStreak++;showToast('🎉 Правильно!');if(_quizStreak%3===0)confetti();}else{_quizStreak=0;showToast('❌ Наступного разу!');}updateStats();_quizIndex++;setTimeout(showQuizCard,400);}
renderWords();renderSentences();updateStats();
</script>
